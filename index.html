<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brayan Lucena - Sorteos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; }
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #001f3f 0%, #050505 85%);
            z-index: -1;
        }
        .bento-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            backdrop-filter: blur(12px);
        }
        .btn-luck {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        .ticket-badge {
            background: #facc15;
            color: black;
            font-weight: 800;
            padding: 12px 20px;
            border-radius: 15px;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="bg-glow"></div>

    <div id="step-1">
        <header class="text-center mt-10 mb-8">
            <div class="relative inline-block p-1 rounded-full bg-gradient-to-tr from-blue-600 to-blue-400">
                <img src="https://api.screenshotmachine.com/?key=ca799a&url=https%3A%2F%2Fwww.brayanlucena.com%2Fimages%2Fprofile.png&dimension=300x300&format=png" alt="Perfil" class="w-24 h-24 rounded-full border-4 border-black object-cover bg-white">
            </div>
            <h1 class="text-3xl font-black mt-4 uppercase italic">BRAYAN LUCENA</h1>
            <span class="bg-blue-600/20 text-blue-400 text-[10px] px-4 py-1.5 rounded-full font-black mt-2 inline-block border border-blue-600/30 uppercase tracking-widest">Sorteo Activo</span>
        </header>

        <div class="bento-card overflow-hidden mb-6">
            <div class="bg-white p-4">
                <img src="https://api.screenshotmachine.com/?key=ca799a&url=https%3A%2F%2Fwww.brayanlucena.com%2Fimages%2Fproduct.png&dimension=1024x768&format=png" alt="Sorteo" class="w-full h-auto object-contain">
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase">Bera SBR 2024</h2>
                        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mt-1">0KM - Full Equipo</p>
                    </div>
                    <div class="text-blue-500 font-black text-2xl text-right">310<br><span class="text-xs">Bs</span></div>
                </div>

                <div class="grid grid-cols-3 gap-3 mb-4">
                    <button onclick="generarSuerte(1)" class="bg-white/5 border border-white/10 py-3 rounded-2xl font-black text-sm text-white hover:bg-white/10">1 Ticket</button>
                    <button onclick="generarSuerte(3)" class="bg-white/5 border border-white/10 py-3 rounded-2xl font-black text-sm text-white hover:bg-white/10">3 Tickets</button>
                    <button onclick="generarSuerte(5)" class="bg-white/5 border border-white/10 py-3 rounded-2xl font-black text-sm text-white hover:bg-white/10">5 Tickets</button>
                </div>

                <button onclick="generarSuerte(1)" class="btn-luck w-full py-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3 active:scale-95 text-white">
                    <i class="fa-solid fa-dice text-2xl animate-pulse"></i> ¡DAME MI SUERTE!
                </button>
            </div>
        </div>

        <div id="box-suerte" class="hidden mb-10 text-center">
            <div id="contenedor-num" class="flex flex-wrap justify-center gap-3"></div>
        </div>

        <div class="flex justify-between items-center py-8 px-4 opacity-70 grayscale brightness-200">
            <i class="fa-solid fa-shield-check text-4xl"></i>
            <i class="fa-solid fa-award text-4xl"></i>
            <i class="fa-solid fa-certificate text-4xl"></i>
        </div>
    </div>

    <div id="step-2" class="hidden">
        <button onclick="volver()" class="mb-6 text-zinc-500 font-black text-[10px] uppercase tracking-widest"><i class="fa-solid fa-chevron-left mr-1"></i> Regresar</button>
        <div class="bento-card p-8">
            <h2 class="text-3xl font-black mb-8 italic uppercase text-blue-500">Pago Móvil</h2>
            <div class="space-y-4 font-bold text-sm text-white">
                <div class="flex justify-between border-b border-white/5 pb-2"><span>BANCO</span> <span>BANESCO</span></div>
                <div class="flex justify-between border-b border-white/5 pb-2"><span>CÉDULA</span> <span>V-00.000.000</span></div>
                <div class="flex justify-between"><span>TELÉFONO</span> <span>0412-0000000</span></div>
            </div>
            <form onsubmit="finalizar(event)" class="mt-8 space-y-4">
                <input type="text" placeholder="Nombre completo" required class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none text-white">
                <button type="submit" class="w-full bg-green-600 py-6 rounded-3xl font-black text-2xl uppercase mt-4 text-white">Confirmar Pago</button>
            </form>
        </div>
    </div>

    <div id="barra-checkout" class="fixed bottom-0 left-0 w-full p-6 bg-black/95 border-t border-white/10 hidden z-50">
        <div class="max-w-md mx-auto flex justify-between items-center px-2">
            <div class="text-2xl font-black text-white"><span id="txt-total">0</span> <span class="text-xs">Bs</span></div>
            <button onclick="irAPagar()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black text-sm uppercase text-white">Continuar</button>
        </div>
    </div>

    <script>
        let seleccion = [];
        const precioTicket = 310;
        function generarSuerte(cantidad) {
            seleccion = [];
            const cont = document.getElementById('contenedor-num');
            cont.innerHTML = '';
            for(let i=0; i<cantidad; i++) {
                let n = Math.floor(Math.random() * 1000).toString().padStart(3,'0');
                seleccion.push(n);
                let el = document.createElement('div');
                el.className = 'ticket-badge';
                el.innerText = '#' + n;
                cont.appendChild(el);
            }
            document.getElementById('box-suerte').classList.remove('hidden');
            document.getElementById('barra-checkout').classList.remove('hidden');
            document.getElementById('txt-total').innerText = (seleccion.length * precioTicket);
        }
        function irAPagar() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('barra-checkout').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }
        function volver() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('barra-checkout').classList.remove('hidden');
        }
        function finalizar(e) {
            e.preventDefault();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            alert("¡Reporte enviado! Mucha suerte.");
            location.reload();
        }
    </script>
</body>
</html>
