<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brayan Lucena - Coroto de la Suerte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #001f3f 0%, #050505 85%); z-index: -1; }
        .bento-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; backdrop-filter: blur(12px); overflow: hidden; }
        .btn-luck { background: linear-gradient(90deg, #1e40af, #3b82f6); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .ticket-badge { background: #facc15; color: black; font-weight: 800; padding: 12px 20px; border-radius: 15px; }
        .success-icon { background: #22c55e; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="bg-glow"></div>

    <header class="text-center mt-10 mb-8">
        <div class="relative inline-block p-1 rounded-full bg-blue-500 shadow-lg">
            <img src="/logo2.png" alt="Brayan" class="w-24 h-24 rounded-full border-4 border-black object-cover bg-white">
        </div>
        <h1 class="text-3xl font-black mt-4 uppercase italic">BRAYAN LUCENA</h1>
        <span class="bg-blue-600/20 text-blue-400 text-[10px] px-4 py-1.5 rounded-full font-black mt-2 inline-block border border-blue-600/30 uppercase tracking-widest">Sorteo Activo</span>
    </header>

    <div id="pantalla-sorteo">
        <div class="bento-card mb-8">
            <div class="bg-white p-6 flex justify-center">
                <img src="/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" alt="Coroto" class="max-w-full h-auto">
            </div>
            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase">Bera SBR 2024</h2>
                        <p class="text-zinc-500 text-[10px] font-bold uppercase mt-1">Sorteo Autorizado</p>
                    </div>
                    <div class="text-right">
                        <span class="text-blue-500 font-black text-3xl">310</span>
                        <span class="text-blue-500 font-bold text-sm block italic">Bs</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button type="button" onclick="generar(1)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm text-white active:bg-white/20">1 Ticket</button>
                    <button type="button" onclick="generar(3)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm text-white active:bg-white/20">3 Tickets</button>
                    <button type="button" onclick="generar(5)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm text-white active:bg-white/20">5 Tickets</button>
                </div>

                <button type="button" onclick="generar(1)" class="btn-luck w-full py-6 rounded-3xl font-black text-xl flex items-center justify-center gap-3 active:scale-95 text-white uppercase">
                    ¡DAME MI SUERTE!
                </button>
            </div>
        </div>
        
        <div id="box-suerte" class="hidden mb-12 text-center">
            <div id="contenedor-num" class="flex flex-wrap justify-center gap-4"></div>
        </div>
    </div>

    <div id="pantalla-pago" class="hidden">
        <div class="bento-card p-8">
            <h2 class="text-2xl font-black italic uppercase mb-6 text-center text-blue-400">PAGO MÓVIL</h2>
            <div class="bg-blue-600/10 border border-blue-600/30 rounded-2xl p-4 mb-8 text-sm">
                <p class="flex justify-between mb-2 text-white"><span>Banco:</span> <strong>Banesco</strong></p>
                <p class="flex justify-between mb-2 text-white"><span>Cédula:</span> <strong>27.123.456</strong></p>
                <p class="flex justify-between mb-2 text-white"><span>Teléfono:</span> <strong>0412-1234567</strong></p>
            </div>
            <div class="space-y-4 text-left">
                <input type="text" id="nombre-usuario" placeholder="Nombre Completo" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-white">
                <input type="file" accept="image/*" id="file-pago" class="w-full bg-white/5 border border-white/10 p-3 rounded-2xl text-xs text-zinc-400">
            </div>
            <button type="button" onclick="confirmarPago()" class="btn-luck w-full py-5 rounded-3xl font-black text-lg mt-8 text-white uppercase">Finalizar Registro</button>
        </div>
    </div>

    <div id="pantalla-exito" class="hidden text-center">
        <div class="bento-card p-10">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-black uppercase italic mb-2">¡PAGO RECIBIDO!</h2>
            <p class="text-zinc-400 text-sm mb-6">Registro completado. Verificaremos tu pago en breve.</p>
            <div class="border-t border-white/10 pt-6">
                <span class="bg-green-500/20 text-green-400 px-4 py-1 rounded-full text-xs font-bold border border-green-500/30 uppercase tracking-tighter">Pendiente por Validar</span>
            </div>
        </div>
        <button onclick="location.reload()" class="mt-8 text-blue-400 font-bold uppercase text-xs tracking-widest underline">Volver al inicio</button>
    </div>

    <div class="flex justify-around items-center opacity-40 grayscale brightness-200 px-4 mt-12">
        <img src="/01KB7XJHRR2TC2YW06D29BSCCG.png" class="h-8">
        <img src="/01KB7XKDXWKTAYQQYC8HPJ96Z9.png" class="h-8">
        <img src="/01KB7XK2M5FV6NVX8V9X1AK498.png" class="h-8">
    </div>

    <div id="barra" class="fixed bottom-0 left-0 w-full p-6 bg-black/95 border-t border-white/10 hidden z-50">
        <div class="max-w-md mx-auto flex justify-between items-center px-2">
            <div class="text-2xl font-black text-white"><span id="total">0</span> <span class="text-xs">Bs</span></div>
            <button type="button" onclick="irAPago()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black text-sm uppercase text-white shadow-lg active:scale-95">Continuar</button>
        </div>
    </div>

    <script>
        function generar(n) {
            console.log("Generando " + n + " tickets..."); // Para verificar en consola
            const cont = document.getElementById('contenedor-num');
            const box = document.getElementById('box-suerte');
            const barra = document.getElementById('barra');
            const totalDisplay = document.getElementById('total');

            cont.innerHTML = '';
            for(let i=0; i<n; i++) {
                let num = Math.floor(Math.random()*1000).toString().padStart(3,'0');
                cont.innerHTML += `<div class="ticket-badge">#${num}</div>`;
            }

            box.classList.remove('hidden');
            barra.classList.remove('hidden');
            totalDisplay.innerText = n * 310;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
        }

        function irAPago() {
            document.getElementById('pantalla-sorteo').classList.add('hidden');
            document.getElementById('barra').classList.add('hidden');
            document.getElementById('pantalla-pago').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function confirmarPago() {
            const nombre = document.getElementById('nombre-usuario').value;
            if(nombre.trim() === "") {
                alert("Por favor, ingresa tu nombre.");
                return;
            }
            document.getElementById('pantalla-pago').classList.add('hidden');
            document.getElementById('pantalla-exito').classList.remove('hidden');
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
