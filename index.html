<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brayan Lucena - Bera SBR 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 75%);
            z-index: -1;
        }

        .bento { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 32px; 
            backdrop-filter: blur(15px); 
        }
        
        .btn-select { 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 18px; 
            padding: 16px; 
            font-weight: 900; 
            font-size: 11px; 
            letter-spacing: 1px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-select:active { background: rgba(37, 99, 235, 0.2); transform: scale(0.92); border-color: #2563eb; }

        .btn-luck { 
            background: linear-gradient(135deg, #1e40af, #3b82f6); 
            border-radius: 24px; 
            padding: 20px; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-style: italic; 
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3); 
            width: 100%; 
            border: none;
            color: white;
            cursor: pointer;
        }
        .btn-luck:active { transform: scale(0.96); opacity: 0.9; }

        .ticket { 
            background: #facc15; 
            color: #000; 
            font-weight: 900; 
            padding: 10px 18px; 
            border-radius: 12px; 
            margin: 5px; 
            display: inline-block; 
            transform: rotate(-1.5deg); 
            box-shadow: 0 6px 15px rgba(250, 204, 21, 0.3);
            animation: popIn 0.4s ease-out;
        }
        @keyframes popIn { from { transform: scale(0.5) rotate(5deg); opacity: 0; } to { transform: scale(1) rotate(-1.5deg); opacity: 1; } }

        /* DISEÑO DE RECIBO /COMPRA/323 */
        .check-circle { 
            width: 80px; height: 80px; 
            background: #2563eb; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 24px; 
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
        }
        .receipt-line { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .label { color: #64748b; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; }
        .value { color: #fff; font-weight: 700; font-size: 15px; text-transform: uppercase; }
        .ticket-mini { background: #2563eb; color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 12px; margin-left: 6px; font-style: italic; }

        .admin-entry { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="max-w-md mx-auto p-5 pb-28">

    <header class="text-center my-10">

            <img src="logo2 (1).png" alt="Brayan Lucena" class="w-28 h-28 rounded-full border-4 border-black object-cover bg-white shadow-2xl">
            <div class="absolute bottom-1 right-2 w-6 h-6 bg-green-500 rounded-full border-4 border-[#050505]"></div>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">BRAYAN LUCENA</h1>
        <p class="text-blue-500 text-[11px] font-black tracking-[0.4em] uppercase mt-2">Coroto de la Suerte</p>
    </header>

    <div class="bento p-7 mb-8">

            <span id="porc-num" class="text-blue-400 font-black text-sm italic">100% LIBRES</span>
        </div>
        <div class="w-full h-3.5 bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">

        </div>
    </div>

            </div>
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase leading-none">Bera SBR<br><span class="text-blue-500">2026</span></h2>
                        <span class="inline-block mt-3 text-[9px] font-black text-zinc-500 uppercase tracking-widest">Sorteo Activo</span>
                    </div>
                    <div class="text-right">
                        <span class="text-4xl font-black text-white">310</span>
                        <span class="text-blue-500 text-[10px] font-black block uppercase italic">Bs / Ticket</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button onclick="generarTickets(1)" class="btn-select">1 TICKET</button>
                    <button onclick="generarTickets(3)" class="btn-select">3 TICKETS</button>
                    <button onclick="generarTickets(5)" class="btn-select text-blue-400 border-blue-900/30">5 TICKETS</button>
                </div>
                
                <button onclick="generarTickets(1)" class="btn-luck">¡OBTENER NÚMEROS!</button>
            </div>
        </div>

        <div id="area-suerte" class="hidden text-center mb-12">
            <p class="text-[10px] font-black text-blue-400 uppercase mb-3 italic tracking-widest">Tus números asignados:</p>
            <div id="contenedor-tickets"></div>
        </div>
    </div>

                <div class="flex justify-between text-sm"><span class="label">Banco</span><strong>BANESCO</strong></div>
                <div class="flex justify-between text-sm"><span class="label">Cédula</span><strong>27.123.456</strong></div>
                <div class="flex justify-between text-sm"><span class="label">Teléfono</span><strong>0412-1234567</strong></div>
            </div>
            
            <div class="space-y-5">
                <input type="text" id="input-nombre" placeholder="Nombre y Apellido" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 outline-none focus:border-blue-500 font-bold transition-all text-white">
                <div class="relative">
                    <input type="file" id="input-file" class="w-full bg-white/5 p-4 rounded-2xl text-xs text-zinc-500 border border-white/10 file:hidden">
