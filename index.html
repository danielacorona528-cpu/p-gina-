<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brayan Lucena - Coroto de la Suerte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #001f3f 0%, #050505 85%); z-index: -1; }
        .bento-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; backdrop-filter: blur(12px); overflow: hidden; }
        .btn-luck { background: linear-gradient(90deg, #1e40af, #3b82f6); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .ticket-badge { background: #facc15; color: black; font-weight: 800; padding: 12px 20px; border-radius: 15px; margin: 5px; display: inline-block; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="bg-glow"></div>

    <header class="text-center mt-10 mb-8">
        <div class="relative inline-block p-1 rounded-full bg-blue-500">
            <img src="logo2%20(1).png" alt="Perfil" class="w-24 h-24 rounded-full border-4 border-black object-cover bg-white">
        </div>
        <h1 class="text-3xl font-black mt-4 uppercase italic tracking-tighter">BRAYAN LUCENA</h1>
    </header>

    <div id="seccion-principal">
        <div class="bento-card mb-8 text-center">
            <div class="bg-white p-6">
                <img src="jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" alt="Moto" class="mx-auto max-h-48">
            </div>
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold uppercase italic text-left text-white">Bera SBR 2024</h2>
                    <span class="text-blue-500 font-black text-2xl uppercase">310 Bs</span>
                </div>
                
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button class="btn-generar bg-white/10 py-4 rounded-2xl font-black" data-tickets="1">1 Ticket</button>
                    <button class="btn-generar bg-white/10 py-4 rounded-2xl font-black" data-tickets="3">3 Tickets</button>
                    <button class="btn-generar bg-white/10 py-4 rounded-2xl font-black" data-tickets="5">5 Tickets</button>
                </div>
                
                <button class="btn-generar btn-luck w-full py-5 rounded-3xl font-black text-xl text-white uppercase" data-tickets="1">¡Dame mi suerte!</button>
            </div>
        </div>

        <div class="flex justify-around items-center bg-white/5 p-4 rounded-3xl mb-8 grayscale">
            <img src="conalot.png" class="h-6" onerror="this.style.display='none'">
            <img src="supergana.png" class="h-6" onerror="this.style.display='none'">
            <img src="tachira.png" class="h-6" onerror="this.style.display='none'">
        </div>

        <div id="resultado-suerte" class="hidden text-center mb-10">
            <div id="lista-tickets"></div>
        </div>
    </div>

    <div id="seccion-pago" class="hidden">
        <div class="bento-card p-8">
            <h2 class="text-2xl font-black text-blue-400 mb-6 uppercase text-center">Pago Móvil</h2>
            <div class="bg-blue-600/10 p-4 rounded-2xl mb-6 text-sm">
                <p>Banco: <b>Banesco</b></p>
                <p>Cédula: <b>27.123.456</b></p>
                <p>Teléfono: <b>0412-1234567</b></p>
            </div>
            <input type="text" id="nombre" placeholder="Nombre Completo" class="w-full bg-white/10 p-4 rounded-2xl mb-4 outline-none">
            <input type="file" id="foto" class="w-full bg-white/10 p-3 rounded-2xl mb-6 text-xs">
            <button id="finalizar" class="btn-luck w-full py-5 rounded-3xl font-black uppercase text-white">Confirmar Pago</button>
        </div>
    </div>

    <div id="barra-footer" class="fixed bottom-0 left-0 w-full p-6 bg-black/90 border-t border-white/10 hidden">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="text-2xl font-black"><span id="monto">0</span> Bs</div>
            <button id="btn-continuar" class="bg-blue-600 px-8 py-4 rounded-2xl font-black uppercase text-sm">Continuar</button>
        </div>
    </div>

    <script>
        // Lógica de generación de tickets
        document.querySelectorAll('.btn-generar').forEach(boton => {
            boton.addEventListener('click', () => {
                const cantidad = parseInt(boton.getAttribute('data-tickets'));
                const lista = document.getElementById('lista-tickets');
                lista.innerHTML = '';
                
                for(let i=0; i < cantidad; i++) {
                    const num = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                    lista.innerHTML += `<div class="ticket-badge">#${num}</div>`;
                }
                
                document.getElementById('resultado-suerte').classList.remove('hidden');
                document.getElementById('barra-footer').classList.remove('hidden');
                document.getElementById('monto').innerText = cantidad * 310;
                
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
            });
        });

        // Cambio de pantalla
        document.getElementById('btn-continuar').addEventListener('click', () => {
            document.getElementById('seccion-principal').classList.add('hidden');
            document.getElementById('barra-footer').classList.add('hidden');
            document.getElementById('seccion-pago').classList.remove('hidden');
            window.scrollTo(0, 0);
        });

        // Finalizar
        document.getElementById('finalizar').addEventListener('click', () => {
            const nombre = document.getElementById('nombre').value;
            if(!nombre) return alert("Escribe tu nombre");
            alert("¡Registro recibido! Verificaremos tu pago.");
            location.reload();
        });
    </script>
</body>
</html>
