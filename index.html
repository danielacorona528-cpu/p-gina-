<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorteo Bera SBR 2026 | Brayan Lucena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --primary: #2563eb; --accent: #fbbf24; --bg: #0f172a; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; }
        .main-glow { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 100%; background: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #0f172a 70%); z-index: -1; }
        .card-pro { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; overflow: hidden; }
        .qty-btn { background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 15px; transition: all 0.3s ease; cursor: pointer; }
        .qty-btn.active { border-color: var(--primary); background: rgba(37, 99, 235, 0.15); transform: scale(1.05); }
        .ticket-pro { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #000; font-weight: 900; padding: 10px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); font-size: 1.2rem; display: inline-block; margin: 5px; }
        #admin-panel { display: none; position: fixed; inset: 0; background: #020617; z-index: 9999; overflow-y: auto; padding: 25px; }
        input[type="file"]::-webkit-file-upload-button { background: #1e293b; color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body class="max-w-xl mx-auto px-4 pb-24">
    <div class="main-glow"></div>

    <nav class="flex justify-between items-center py-8 mb-4">
        <div class="flex items-center gap-3 cursor-pointer" ondblclick="checkAdmin()">
            <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center border-2 border-blue-600 overflow-hidden shadow-lg">
                <img src="https://www.brayanlucena.com/img/logo.png" alt="BL" onerror="this.src='https://ui-avatars.com/api/?name=BL&background=2563EB&color=fff'">
            </div>
            <div>
                <h1 class="font-black text-lg uppercase leading-none tracking-tighter">Brayan Lucena</h1>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.3em]">Sorteo Oficial</p>
            </div>
        </div>
        <button onclick="document.getElementById('consulta').scrollIntoView({behavior:'smooth'})" class="text-[10px] font-black bg-white/5 border border-white/10 px-4 py-2 rounded-full uppercase">Mis Tickets</button>
    </nav>

    <div id="main-view">
        <div class="card-pro mb-8 shadow-2xl">
            <div class="bg-white p-10 flex justify-center items-center">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" alt="Bera SBR 2026" class="h-48 object-contain drop-shadow-2xl">
            </div>
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 class="text-3xl font-black italic uppercase">Bera SBR <span class="text-blue-500">2026</span></h2>
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Edición Especial</span>
                    </div>
                    <div class="text-right"><p class="text-4xl font-black italic">310<span class="text-blue-500 text-sm">Bs</span></p></div>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-8">
                    <div id="q1" onclick="setQty(1)" class="qty-btn active text-center"><p class="text-2xl font-black">1</p><p class="text-[9px] font-bold uppercase opacity-50">Ticket</p></div>
                    <div id="q3" onclick="setQty(3)" class="qty-btn text-center"><p class="text-2xl font-black">3</p><p class="text-[9px] font-bold uppercase opacity-50">Tickets</p></div>
                    <div id="q5" onclick="setQty(5)" class="qty-btn text-center"><p class="text-2xl font-black">5</p><p class="text-[9px] font-bold uppercase opacity-50">Tickets</p></div>
                </div>
                <button onclick="getTickets()" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-xl italic uppercase shadow-xl transition-all active:scale-95">¡Obtener Números!</button>
            </div>
        </div>

        <div id="tickets-area" class="hidden text-center mb-12"><p class="text-blue-500 font-black text-[10px] uppercase mb-4 tracking-widest">Tus números asignados:</p><div id="tickets-list"></div></div>

        <div id="consulta" class="card-pro p-8 mb-12 border-dashed">
            <h3 class="text-center font-black uppercase text-[10px] text-zinc-500 tracking-[0.4em] mb-6">Verificar mis números</h3>
            <div class="flex gap-2">
                <input type="text" id="search-input" placeholder="Tu nombre..." class="flex-1 bg-black/30 p-4 rounded-xl border border-white/10 outline-none text-white">
                <button onclick="searchDB()" class="bg-zinc-800 px-6 rounded-xl font-black uppercase text-[10px]">Buscar</button>
            </div>
            <div id="search-results" class="mt-6 flex flex-wrap justify-center gap-2"></div>
        </div>
    </div>

    <div id="footer-pay" class="fixed bottom-0 left-0 w-full p-6 bg-slate-900/90 backdrop-blur-xl border-t border-white/10 hidden z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div><p class="text-[10px] text-zinc-500 font-bold uppercase">Total</p><p class="text-3xl font-black"><span id="total-price">310</span> <span class="text-blue-500 text-xs italic">Bs</span></p></div>
            <button onclick="openRegister()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase text-sm">Continuar</button>
        </div>
    </div>

    <div id="modal-reg" class="fixed inset-0 bg-black/95 z-[100] hidden p-6 overflow-y-auto">
        <div class="max-w-md mx-auto pb-10">
            <h2 class="text-3xl font-black uppercase italic mb-8 text-blue-500">Reportar Pago</h2>
            <div class="card-pro p-6 mb-6 space-y-3 text-sm">
                <div class="flex justify-between border-b border-white/5 pb-2"><span>Pago Móvil</span><strong>0412-1234567</strong></div>
                <div class="flex justify-between"><span>RIF/CI</span><strong>V-12345678</strong></div>
            </div>
            <div class="space-y-4">
                <input type="text" id="reg-name" placeholder="Nombre y Apellido" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-bold outline-none text-white">
                <input type="tel" id="reg-phone" placeholder="Teléfono" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-bold outline-none text-white">
                
                <div class="bg-white/5 p-5 rounded-2xl border border-white/10">
                    <p class="text-[10px] font-black uppercase text-blue-400 mb-3 tracking-widest">Subir Captura de Pago</p>
                    <input type="file" id="reg-image" accept="image/*" class="text-xs text-zinc-500 w-full">
                </div>

                <button onclick="finishSale()" class="w-full bg-green-600 py-5 rounded-2xl font-black uppercase text-lg">Confirmar y Enviar</button>
                <button onclick="document.getElementById('modal-reg').classList.add('hidden')" class="w-full py-4 text-zinc-500 font-bold uppercase text-[10px]">Volver</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic text-blue-500">CONTROL DE VENTAS</h2>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="text-red-500 font-black">CERRAR</button>
        </div>
        <div id="admin-stats" class="grid grid-cols-2 gap-4 mb-8"></div>
        <div id="admin-list" class="space-y-4"></div>
        <button onclick="if(confirm('¿Borrar base de datos?')){localStorage.clear();location.reload();}" class="w-full mt-20 border border-red-900 p-4 text-red-900 font-black text-[10px]">RESET TOTAL</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bera_final_v3')) || { sales: [], used: [] };
        let currentQty = 1;
        let currentTickets = [];

        function setQty(n) {
            currentQty = n;
            document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('q' + n).classList.add('active');
            document.getElementById('tickets-area').classList.add('hidden');
            document.getElementById('footer-pay').classList.add('hidden');
        }

        function getTickets() {
            currentTickets = [];
            const list = document.getElementById('tickets-list');
            list.innerHTML = '';
            while(currentTickets.length < currentQty) {
                let n = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                if(!db.used.includes(n) && !currentTickets.includes(n)) currentTickets.push(n);
            }
            currentTickets.forEach(t => list.innerHTML += `<div class="ticket-pro">#${t}</div>`);
            document.getElementById('tickets-area').classList.remove('hidden');
            document.getElementById('footer-pay').classList.remove('hidden');
            document.getElementById('total-price').innerText = currentQty * 310;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            confetti({ particleCount: 60, spread: 70, origin: { y: 0.9 } });
        }

        function openRegister() { document.getElementById('modal-reg').classList.remove('hidden'); }

        function finishSale() {
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const fileInput = document.getElementById('reg-image');

            if(!name || !phone) return alert("Llena tus datos.");
            
            // Procesar imagen a Base64 para guardarla en el navegador
            let screenshot = "";
            if(fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveToDB(name, phone, e.target.result);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveToDB(name, phone, "");
            }
        }

        function saveToDB(name, phone, imgData) {
            const sale = {
                id: Date.now(),
                name: name,
                phone: phone,
                tickets: [...currentTickets],
                total: currentQty * 310,
                img: imgData,
                date: new Date().toLocaleString()
            };
            db.sales.push(sale);
            db.used.push(...currentTickets);
            localStorage.setItem('bera_final_v3', JSON.stringify(db));
            alert("¡Pago reportado con éxito!");
            location.reload();
        }

        function searchDB() {
            const q = document.getElementById('search-input').value.toLowerCase().trim();
            const res = document.getElementById('search-results');
            res.innerHTML = '';
            if(!q) return;
            const found = db.sales.filter(s => s.name.toLowerCase().includes(q) || s.tickets.includes(q));
            if(found.length > 0) {
                found.forEach(s => s.tickets.forEach(t => res.innerHTML += `<span class="bg-blue-600 px-3 py-1 rounded-md text-xs font-black">#${t}</span>`));
            } else { res.innerHTML = '<p class="text-red-500 text-[10px] font-black uppercase">Sin registros</p>'; }
        }

        function checkAdmin() {
            if(prompt("Clave Admin:") === "2026") {
                document.getElementById('admin-panel').style.display = 'block';
                const income = db.sales.reduce((acc, s) => acc + s.total, 0);
                document.getElementById('admin-stats').innerHTML = `
                    <div class="card-pro p-5 text-center"><p class="text-[10px] opacity-50 uppercase">Tickets</p><p class="text-2xl font-black">${db.used.length}</p></div>
                    <div class="card-pro p-5 text-center"><p class="text-[10px] opacity-50 uppercase">Total Bs</p><p class="text-2xl font-black text-green-500">${income}</p></div>
                `;
                document.getElementById('admin-list').innerHTML = db.sales.map(s => `
                    <div class="card-pro p-4 text-[11px] mb-3 border-l-4 border-blue-600">
                        <div class="flex justify-between font-black text-blue-400 mb-1 uppercase"><span>${s.name}</span><span>${s.total} Bs</span></div>
                        <div class="text-zinc-300 font-bold mb-2">${s.tickets.join(' - ')}</div>
                        <div class="flex justify-between items-center mt-3">
                            <span class="opacity-30 text-[9px]">${s.phone} | ${s.date}</span>
                            ${s.img ? `<button onclick="showImg('${s.img}')" class="bg-blue-600 px-3 py-1 rounded font-black text-[9px]">VER PAGO</button>` : '<span class="text-red-500 text-[9px]">SIN CAPTURA</span>'}
                        </div>
                    </div>
                `).reverse().join('');
            }
        }

        function showImg(data) {
            const w = window.open("");
            w.document.write(`<img src="${data}" style="max-width:100%">`);
        }
    </script>
</body>
</html>
