<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brayan Lucena - Bera SBR 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 85%); z-index: -1; }
        .bento-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; backdrop-filter: blur(12px); }
        .btn-luck { background: linear-gradient(90deg, #1e40af, #3b82f6); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); border: none; cursor: pointer; }
        .ticket-badge { background: #facc15; color: black; font-weight: 900; padding: 10px 18px; border-radius: 14px; margin: 4px; display: inline-block; transform: rotate(-1deg); animation: pop 0.3s ease; }
        .progress-fill { transition: width 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1) rotate(-1deg); } }
        
        /* ESTILO RECIBO /COMPRA/323 */
        .check-circle { width: 64px; height: 64px; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }
        .row-item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .row-label { color: #94a3b8; text-transform: uppercase; font-size: 10px; font-weight: 900; letter-spacing: 0.1em; }
        .row-value { font-weight: 700; color: #fff; font-size: 13px; }
        .ticket-mini { background: #2563eb; color: white; padding: 3px 10px; border-radius: 6px; font-weight: 900; font-size: 11px; font-style: italic; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="bg-glow"></div>

    <header id="app-header" class="text-center mt-6 mb-8">
        <div class="relative inline-block p-1 rounded-full bg-blue-600 shadow-lg mb-4 cursor-pointer" ondblclick="abrirAdmin()">
            <img src="logo2 (1).png" alt="Logo" class="w-20 h-20 rounded-full border-4 border-black object-cover bg-white">
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">BRAYAN LUCENA</h1>
        <p class="text-blue-400 text-[10px] font-black tracking-[0.3em] uppercase">Coroto de la Suerte</p>
    </header>

    <div id="panel-progreso" class="bento-card p-6 mb-6">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Disponibilidad</span>
            <span class="text-blue-400 font-black text-sm" id="txt-porcentaje">100% Libres</span>
        </div>
        <div class="w-full h-3 bg-white/10 rounded-full overflow-hidden p-0.5">
            <div id="barra-progreso" class="progress-fill h-full bg-gradient-to-r from-blue-700 to-blue-400 rounded-full" style="width: 100%"></div>
        </div>
    </div>

    <div id="view-home">
        <div class="bento-card mb-6 overflow-hidden">
            <div class="bg-white p-4 flex justify-center border-b border-white/10">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" alt="Moto" class="max-w-full h-auto">
            </div>
            <div class="p-8 text-center sm:text-left">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase">Bera SBR 2026</h2>
                        <span class="text-blue-500 font-bold text-[10px] uppercase tracking-widest italic">Sorteo Activo</span>
                    </div>
                    <div class="text-right">
                        <span class="text-3xl font-black text-white">310</span>
                        <span class="text-blue-500 font-bold text-xs block uppercase">Bs / Ticket</span>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button type="button" onclick="pidoTickets(1)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-xs hover:bg-white/10 active:scale-95 uppercase">1 Tkt</button>
                    <button type="button" onclick="pidoTickets(3)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-xs hover:bg-white/10 active:scale-95 uppercase">3 Tkts</button>
                    <button type="button" onclick="pidoTickets(5)" class="bg-blue-600/10 border border-blue-600/20 py-4 rounded-2xl font-black text-xs text-blue-400 hover:bg-blue-600/20 active:scale-95 uppercase">5 Tkts</button>
                </div>

                <button type="button" onclick="pidoTickets(1)" class="btn-luck w-full py-5 rounded-3xl font-black text-lg text-white uppercase italic">¡QUIERO MI SUERTE!</button>
            </div>
        </div>

        <div id="contenedor-suerte" class="hidden text-center mb-10">
            <p class="text-[10px] font-black uppercase text-yellow-500 mb-2 italic">Números Asignados:</p>
            <div id="tickets-generados" class="flex flex-wrap justify-center"></div>
        </div>
    </div>

    <div id="view-pago" class="hidden">
        <div class="bento-card p-8">
            <h2 class="text-2xl font-black text-blue-400 mb-6 uppercase text-center italic">Reportar Pago</h2>
            <div class="space-y-3 bg-white/5 p-5 rounded-2xl mb-6 border border-white/10 text-sm">
