<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brayan Lucena - Sorteos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        
        /* Fondo con el resplandor azul de la página de Brayan */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #003366 0%, #050505 80%);
            z-index: -1;
        }

        .bento-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .btn-luck {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .ticket-badge {
            background: #facc15;
            color: black;
            font-weight: 900;
            padding: 10px 20px;
            border-radius: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="bg-glow"></div>

    <div id="step-1">
        <header class="text-center mt-8 mb-10">
            <div class="relative inline-block p-1 rounded-full bg-gradient-to-b from-blue-500 to-purple-600">
                <img src="https://i.postimg.cc/mD3m9vH1/image.png" alt="Perfil" class="w-24 h-24 rounded-full border-4 border-black object-cover">
            </div>
            <h1 class="text-2xl font-extrabold mt-4">BRAYAN LUCENA</h1>
            <div class="bg-blue-600/20 text-blue-400 text-[10px] px-3 py-1 rounded-full inline-block font-bold mt-2 uppercase tracking-widest">
                GRAN SORTEO ACTIVO
            </div>
        </header>

        <div class="space-y-6">
            <div class="bento-card overflow-hidden">
                <img src="https://i.ibb.co/m5ZzW1x/moto-sbr.jpg" alt="Premio Moto" class="w-full h-52 object-cover">
                <div class="p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-xl font-black">BERA SBR 2024 0KM</h2>
                            <p class="text-zinc-500 text-xs mt-1">Sorteo avalado por CONALOT</p>
                        </div>
                        <span class="text-blue-500 font-black text-xl">$5.00</span>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-3 mt-6 mb-4">
                        <button onclick="generarSuerte(1)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold hover:bg-white/10">1 Ticket</button>
                        <button onclick="generarSuerte(3)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold hover:bg-white/10">3 Tickets</button>
                        <button onclick="generarSuerte(5)" class="bg-white/5 border border-white/10 py-3 rounded-xl font-bold hover:bg-white/10">5 Tickets</button>
                    </div>

                    <button onclick="generarSuerte(1)" class="btn-luck w-full py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2">
                        <i class="fa-solid fa-dice text-2xl"></i> ¡DAME MI SUERTE!
                    </button>
                </div>
            </div>

            <div id="resultado-suerte" class="hidden p-6 bento-card border-blue-500/50 text-center animate-bounce">
                <p class="text-xs text-zinc-500 mb-3 font-bold uppercase">Tus números asignados:</p>
                <div id="contenedor-num" class="flex flex-wrap justify-center gap-2"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-8 py-10 opacity-50 grayscale hover:grayscale-0 transition-all">
            <img src="https://conalot.gob.ve/wp-content/uploads/2022/01/LOGO-CONALOT-NUEVO.png" class="h-8 object-contain mx-auto">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Logo_de_la_Loter%C3%ADa_del_T%C3%A1chira.png/1200px-Logo_de_la_Loter%C3%ADa_del_T%C3%A1chira.png" class="h-8 object-contain mx-auto">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A7yR_fK_XpS9W5_5I_jD-1Z8V-1_y0_yvA&s" class="h-8 object-contain mx-auto">
        </div>
    </div>

    <div id="step-2" class="hidden">
        <button onclick="volver()" class="text-zinc-500 font-bold text-xs mb-6 uppercase"><i class="fa-solid fa-arrow-left"></i> Regresar</button>
        <div class="bento-card p-8">
            <h2 class="text-3xl font-black mb-6 italic text-blue-400">PAGO MÓVIL</h2>
            <div class="space-y-4 font-bold text-sm">
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-zinc-500">BANCO</span> <span>BANESCO</span></div>
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-zinc-500">CÉDULA</span> <span>V-12.345.678</span></div>
                <div class="flex justify-between"><span class="text-zinc-500">TELÉFONO</span> <span>0412-1234567</span></div>
            </div>

            <form onsubmit="finalizar(event)" class="mt-8 space-y-4">
                <input type="text" placeholder="Nombre completo" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500">
                <div class="bento-card p-6 border-dashed border-white/20 text-center">
                    <label class="cursor-pointer">
                        <i class="fa-solid fa-camera text-2xl text-blue-500 mb-2"></i>
                        <p id="txt-file" class="text-[10px] font-black uppercase text-zinc-500">Adjuntar Capture</p>
                        <input type="file" required class="hidden" onchange="document.getElementById('txt-file').innerText = 'CARGADO'; document.getElementById('txt-file').className = 'text-green-500 font-black'">
                    </label>
                </div>
                <button type="submit" class="w-full bg-green-600 py-5 rounded-2xl font-black text-xl shadow-lg shadow-green-600/20 uppercase">Confirmar Mi Suerte</button>
            </form>
        </div>
    </div>

    <div id="step-3" class="hidden text-center py-20">
        <div class="w-24 h-24 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl">
            <i class="fa-solid fa-check text-5xl text-white"></i>
        </div>
        <h2 class="text-4xl font-black mb-4 italic">¡RECIBIDO!</h2>
        <p class="text-zinc-500 px-10">Tu pago está en proceso de verificación. ¡Mucha suerte!</p>
        <button onclick="location.reload()" class="mt-12 bg-zinc-900 px-10 py-4 rounded-xl border border-white/10 font-black uppercase text-xs">Aceptar</button>
    </div>

    <div id="float-bar" class="fixed bottom-0 left-0 w-full p-6 bg-black/95 border-t border-white/10 hidden z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <p class="text-2xl font-black">$<span id="total-val">0</span></p>
            <button onclick="irAPagar()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black text-sm uppercase">PAGAR TICKETS</button>
        </div>
    </div>

    <script>
        let misTickets = [];
        const precio = 5;

        function generarSuerte(cant) {
            misTickets = [];
            const cont = document.getElementById('contenedor-num');
            cont.innerHTML = '';
            
            for(let i=0; i<cant; i++){
                let n = Math.floor(Math.random() * 999).toString().padStart(3,'0');
                misTickets.push(n);
                let tag = document.createElement('span');
                tag.className = 'ticket-badge';
                tag.innerText = '#' + n;
                cont.appendChild(tag);
            }

            document.getElementById('resultado-suerte').classList.remove('hidden');
            document.getElementById('float-bar').classList.remove('hidden');
            document.getElementById('total-val').innerText = misTickets.length * precio;
        }

        function irAPagar() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('float-bar').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function volver() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('float-bar').classList.remove('hidden');
        }

        function finalizar(e) {
            e.preventDefault();
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
        }
    </script>
</body>
</html>
