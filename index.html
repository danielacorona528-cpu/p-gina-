<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bera SBR 2026 - Brayan Lucena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #050505; color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 80%); z-index: -1; }
        .bento { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; backdrop-filter: blur(10px); }
        
        /* BOTONES - CORRECCIÓN DE ERROR */
        .btn-action { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; font-weight: 900; font-size: 11px; cursor: pointer; display: block; width: 100%; color: white; text-align: center; }
        .btn-luck { background: linear-gradient(90deg, #1e40af, #3b82f6); border: none; border-radius: 18px; padding: 18px; font-weight: 900; text-transform: uppercase; font-style: italic; width: 100%; cursor: pointer; color: white; font-size: 16px; }
        
        /* ESTILO RECIBO /COMPRA/323 */
        .check-circle { width: 60px; height: 60px; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .row-info { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .row-label { color: #64748b; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .row-value { font-weight: 700; text-transform: uppercase; }
        .t-badge { background: #facc15; color: black; font-weight: 900; padding: 8px 12px; border-radius: 8px; margin: 4px; display: inline-block; font-size: 13px; transform: rotate(-1deg); }
        .t-mini { background: #2563eb; color: white; padding: 3px 8px; border-radius: 4px; font-weight: 900; font-size: 10px; margin-left: 4px; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-20">
    <div class="bg-gradient"></div>

    <header class="text-center my-6">
        <div class="inline-block p-1 bg-blue-600 rounded-full mb-3" ondblclick="abrirAdmin()">
            <img src="logo2 (1).png" alt="Logo" class="w-20 h-20 rounded-full border-4 border-black object-cover bg-white">
        </div>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">BRAYAN LUCENA</h1>
        <p class="text-blue-500 text-[10px] font-black tracking-[0.3em] uppercase">Coroto de la Suerte</p>
    </header>

    <div class="bento p-5 mb-5">
        <div class="flex justify-between items-center mb-2">
            <span class="text-[9px] font-black uppercase text-zinc-500">Disponibilidad</span>
            <span id="porcentaje-txt" class="text-blue-400 font-black text-xs">100% Libres</span>
        </div>
        <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
            <div id="barra-fill" class="h-full bg-blue-600 transition-all duration-700" style="width: 100%"></div>
        </div>
    </div>

    <div id="view-home">
        <div class="bento overflow-hidden mb-5">
            <div class="bg-white p-3 flex justify-center">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" class="w-full h-auto">
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-black uppercase italic">Bera SBR 2026</h2>
                    <div class="text-right"><span class="text-2xl font-black">310</span><span class="text-blue-500 text-[10px] block font-bold">Bs</span></div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button type="button" onclick="sacarTickets(1)" class="btn-action">1 TKT</button>
                    <button type="button" onclick="sacarTickets(3)" class="btn-action">3 TKTS</button>
                    <button type="button" onclick="sacarTickets(5)" class="btn-action text-blue-400">5 TKTS</button>
                </div>
                
                <button type="button" onclick="sacarTickets(1)" class="btn-luck">¡QUIERO MI SUERTE!</button>
            </div>
        </div>
        <div id="area-tickets" class="hidden text-center mb-8">
            <div id="lista-tickets"></div>
        </div>
    </div>

    <div id="view-pago" class="hidden">
        <div class="bento p-6">
            <h2 class="text-center font-black text-blue-500 uppercase mb-5 italic">Reportar Pago Móvil</h2>
            <div class="bg-white/5 p-4 rounded-xl mb-5 text-xs space-y-2">
                <div class="flex justify-between"><span>Banco:</span> <strong>Banesco</strong></div>
                <div class="flex justify-between"><span>Cédula:</span> <strong>27.123.456</strong></div>
                <div class="flex justify-between"><span>Teléfono:</span> <strong>0412-1234567</strong></div>
            </div>
            <input type="text" id="nombre-input" placeholder="Nombre Completo" class="w-full bg-white/10 p-4 rounded-xl mb-4 border border-white/10 outline-none text-white font-bold">
            <input type="file" id="file-input" class="w-full bg-white/5 p-3 rounded-xl mb-6 text-[10px] border border-white/10">
            <button type="button" onclick="procesar()" class="btn-luck">Finalizar Registro</button>
        </div>
    </div>

    <div id="view-exito" class="hidden">
        <div class="check-circle">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2xl font-black uppercase italic text-center mb-1">¡Recibido!</h2>
        <p id="res-fecha" class="text-center text-zinc-500 text-[9px] font-bold uppercase mb-8"></p>
        
        <div class="bento p-5">
            <div class="row-info"><span class="row-label">Comprador</span><span id="res-nombre" class="row-value"></span></div>
            <div class="row-info"><span class="row-label">Sorteo</span><span class="row-value">Bera SBR 2026</span></div>
            <div class="row-info border-none"><span class="row-label">Tickets</span><div id="res-tkts" class="flex flex-wrap justify-end"></div></div>
        </div>
        <button onclick="location.reload()" class="w-full mt-8 py-4 text-zinc-500 font-black uppercase text-[10px]">Cerrar</button>
    </div>

    <div id="view-admin" class="fixed inset-0 bg-black z-[100] hidden p-5 overflow-y-auto">
        <div class="flex justify-between mb-6"><h2 class="font-black text-blue-500">ADMIN</h2><button onclick="cerrarAdmin()" class="text-xs">Cerrar</button></div>
        <div class="grid grid-cols-2 gap-2 mb-6">
            <button onclick="descargar()" class="bg-green-600 p-3 rounded-xl text-[10px] font-black">EXCEL (CSV)</button>
            <button onclick="resetear()" class="bg-red-600 p-3 rounded-xl text-[10px] font-black">RESET</button>
        </div>
        <div id="admin-ventas"></div>
    </div>

    <div id="footer-pago" class="fixed bottom-0 left-0 w-full p-4 bg-black/90 border-t border-white/10 hidden">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="text-2xl font-black"><span id="monto-total">0</span> <span class="text-xs text-blue-500 italic">Bs</span></div>
            <button type="button" onclick="irAPagar()" class="bg-blue-600 px-8 py-3 rounded-xl font-black uppercase text-xs">Continuar</button>
        </div>
    </div>

    <script>
        const MAX = 10000;
        let db = JSON.parse(localStorage.getItem('sorteo_final_db')) || { ventas: [], vendidos: [] };
        let temp = [];

        window.onload = function() {
            const porc = (((MAX - db.vendidos.length) / MAX) * 100).toFixed(1);
            document.getElementById('barra-fill').style.width = porc + '%';
            document.getElementById('porcentaje-txt').innerText = porc + '% Libres';
        };

        function sacarTickets(cant) {
            temp = [];
            const div = document.getElementById('lista-tickets');
            div.innerHTML = '';
            for(let i=0; i<cant; i++) {
                let n;
                do { n = Math.floor(Math.random()*MAX).toString().padStart(4, '0'); } 
                while(db.vendidos.includes(n) || temp.includes(n));
                temp.push(n);
                div.innerHTML += `<div class="t-badge">#${n}</div>`;
            }
            document.getElementById('area-tickets').classList.remove('hidden');
            document.getElementById('footer-pago').classList.remove('hidden');
            document.getElementById('monto-total').innerText = cant * 310;
            confetti({ particleCount: 40, spread: 50 });
        }

        function irAPagar() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('footer-pago').classList.add('hidden');
            document.getElementById('view-pago').classList.remove('hidden
