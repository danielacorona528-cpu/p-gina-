<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Premium - ¡Gana con Nosotros!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        .glow-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #000 80%);
            z-index: -1;
        }

        .ticket {
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 800; cursor: pointer;
            border: 1px solid #222; background: rgba(255,255,255,0.03); transition: 0.3s;
        }
        .ticket.selected { 
            background: #facc15; border-color: #fff; color: #000;
            transform: scale(1.1); box-shadow: 0 0 20px #facc15;
        }

        .bento-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 28px; 
        }

        .step-hidden { display: none; }

        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        /* Estilo para el botón de azar */
        .btn-random {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border: none;
            transition: 0.3s;
        }
        .btn-random:active { transform: scale(0.9); }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="glow-bg"></div>

    <div id="step-selection" class="animate-pop">
        <header class="text-center py-8">
            <div class="inline-block p-1 rounded-full bg-gradient-to-r from-yellow-400 to-blue-600 mb-4 shadow-xl">
                <img src="https://via.placeholder.com/150" class="w-20 h-20 rounded-full border-4 border-black object-cover">
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic">Gran Sorteo Pro</h1>
            <p class="text-yellow-400 font-bold text-xs tracking-widest uppercase">¡Tu suerte empieza aquí!</p>
        </header>

        <div class="bento-card p-5 mb-6">
            <h3 class="text-[10px] font-black mb-3 uppercase text-zinc-500 tracking-widest">Verificar mis números</h3>
            <div class="flex gap-2">
                <input id="input-verify" type="number" placeholder="Ej: 085" class="flex-1 bg-black/50 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-yellow-500">
                <button onclick="verificarTicket()" class="bg-white text-black px-5 rounded-xl font-bold text-xs uppercase tracking-tighter">Revisar</button>
            </div>
        </div>

        <div class="mb-8">
            <button onclick="seleccionarAlAzar()" class="btn-random w-full py-4 rounded-2xl font-black text-sm uppercase flex items-center justify-center gap-3 shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-dice text-xl"></i> ¡DAME UN NÚMERO AL AZAR!
            </button>
        </div>

        <h3 class="text-xs font-black mb-4 uppercase tracking-widest text-zinc-500 ml-2 italic">O elige manualmente:</h3>
        <div class="grid grid-cols-5 gap-3" id="grid-tickets"></div>

        <div id="cart-bar" class="fixed bottom-0 left-0 w-full bg-black/95 p-6 border-t border-zinc-800 step-hidden z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <div>
                    <p class="text-[10px] uppercase font-black text-yellow-500">Elegidos: <span id="cant-tickets" class="text-white">0</span></p>
                    <p class="text-2xl font-black">Total: $<span id="monto-total">0</span></p>
                </div>
                <button onclick="irAPagar()" class="bg-yellow-400 text-black px-10 py-4 rounded-2xl font-black shadow-xl shadow-yellow-500/30">
                    SIGUIENTE <i class="fa-solid fa-arrow-right ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="step-payment" class="step-hidden animate-pop">
        <button onclick="irASeleccion()" class="mb-6 text-zinc-500 font-bold uppercase text-xs tracking-widest"><i class="fa-solid fa-chevron-left mr-1"></i> Cambiar números</button>
        <h2 class="text-3xl font-black mb-2 uppercase italic">PAGO MÓVIL 💸</h2>
        
        <div class="bento-card p-6 mb-8 border-green-500/30">
            <div class="space-y-4 font-bold text-sm">
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-zinc-500">Banco</span> <span>BANESCO</span></div>
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-zinc-500">Cédula</span> <span>V-00.000.000</span></div>
                <div class="flex justify-between"><span class="text-zinc-500">Teléfono</span> <span>0412-0000000</span></div>
            </div>
        </div>

        <form onsubmit="procesarPago(event)" class="space-y-6">
            <input type="text" placeholder="Nombre completo" required class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl outline-none focus:border-green-500 font-bold">
            <div class="bento-card p-6 border-dashed border-zinc-700 text-center">
                <label class="cursor-pointer">
                    <i class="fa-solid fa-camera text-2xl text-yellow-500 mb-2"></i>
                    <p class="text-[10px] font-black text-zinc-400 uppercase">Subir capture de pago</p>
                    <input type="file" accept="image/*" required class="hidden" onchange="this.parentElement.querySelector('p').innerText = '¡LISTO PARA ENVIAR!'">
                </label>
            </div>
            <button type="submit" class="w-full bg-green-500 py-5 rounded-3xl font-black text-xl shadow-2xl shadow-green-500/40 uppercase">Confirmar mi Pago</button>
