<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brayan Lucena - Coroto de la Suerte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #001f3f 0%, #050505 85%); z-index: -1; }
        .bento-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; backdrop-filter: blur(12px); overflow: hidden; }
        .btn-luck { background: linear-gradient(90deg, #1e40af, #3b82f6); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .ticket-badge { background: #facc15; color: black; font-weight: 800; padding: 12px 20px; border-radius: 15px; margin: 5px; display: inline-block; box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3); }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="bg-glow"></div>

    <header class="text-center mt-10 mb-8">
        <div class="relative inline-block p-1 rounded-full bg-blue-500 shadow-xl">
            <img src="logo2 (1).png" alt="Brayan" class="w-24 h-24 rounded-full border-4 border-black object-cover bg-white">
        </div>
        <h1 class="text-3xl font-black mt-4 uppercase italic tracking-tighter">BRAYAN LUCENA</h1>
        <div class="flex justify-center gap-2 mt-2">
            <span class="bg-blue-600/20 text-blue-400 text-[10px] px-4 py-1.5 rounded-full font-black border border-blue-600/30 uppercase tracking-widest italic">Sorteo Activo</span>
        </div>
    </header>

    <div id="seccion-principal">
        <div class="bento-card mb-6">
            <div class="bg-white p-4">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" alt="Bera SBR 2024" class="w-full h-auto rounded-xl shadow-lg">
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase leading-none">Bera SBR 2024</h2>
                        <p class="text-blue-500 text-[10px] font-bold uppercase mt-1 tracking-tighter">Nueva 0 Kilómetros</p>
                    </div>
                    <div class="bg-blue-600 px-4 py-2 rounded-2xl text-center">
                        <span class="text-white font-black text-xl leading-none">310</span>
                        <span class="text-white font-bold text-[10px] block uppercase">Bs</span>
                    </div>
                </div>
                
                <p class="text-[10px] text-zinc-500 font-bold uppercase mb-4 text-center tracking-widest">Elige tus tickets de la suerte</p>
                
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button onclick="generar(1)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm active:bg-blue-600 transition-all">1 Ticket</button>
                    <button onclick="generar(3)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm active:bg-blue-600 transition-all">3 Tickets</button>
                    <button onclick="generar(5)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm active:bg-blue-600 transition-all">5 Tickets</button>
                </div>

                <button onclick="generar(1)" class="btn-luck w-full py-6 rounded-3xl font-black text-xl flex items-center justify-center gap-3 active:scale-95 text-white">
                    ¡PROBAR MI SUERTE!
                </button>
            </div>
        </div>

        <div class="bento-card p-6 mb-6 flex justify-around items-center grayscale opacity-80">
            <img src="https://brayanlucena2.vercel.app/01KB7XJHRR2TC2YW06D29BSCCG.png" class="h-8" alt="Conalot">
            <img src="https://brayanlucena2.vercel.app/01KB7XKDXWKTAYQQYC8HPJ96Z9.png" class="h-8" alt="SuperGana">
            <img src="https://brayanlucena2.vercel.app/01KB7XK2M5FV6NVX8V9X1AK498.png" class="h-8" alt="Loteria">
        </div>

        <div class="text-center px-6 mb-10">
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Avalado por la Conalot bajo el Runlot:</p>
            <p class="text-[10px] text-blue-500 font-black tracking-widest">CNL-ORF-2025-000661</p>
        </div>

        <div id="box-suerte" class="hidden text-center mb-10 animate-bounce">
            <div id="contenedor-num"></div>
        </div>
    </div>

    <div id="seccion-pago" class="hidden">
        <div class="bento-card p-8">
            <div class="bg-blue-600/10 border border-blue-600/30 rounded-3xl p-6 mb-8">
                <h2 class="text-center font-black text-blue-400 uppercase italic mb-4">Datos de Pago</h2>
                <div class="space-y-2 text-sm uppercase font-bold tracking-tighter">
                    <p class="flex justify-between border-b border-white/5 pb-2"><span>Banco:</span> <span class="text-blue-400">Banesco</span></p>
                    <p class="flex justify-between border-b border-white/5 pb-2"><span>Cédula:</span> <span class="text-blue-400">27.123.456</span></p>
                    <p class="flex justify-between"><span>Teléfono:</span> <span class="text-blue-400">0412-1234567</span></p>
                </div>
