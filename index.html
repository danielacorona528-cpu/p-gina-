<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brayan Lucena - Coroto de la Suerte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #001f3f 0%, #050505 85%); z-index: -1; }
        .bento-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; backdrop-filter: blur(12px); overflow: hidden; }
        .btn-luck { background: linear-gradient(90deg, #1e40af, #3b82f6); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transition: transform 0.2s; }
        .btn-luck:active { transform: scale(0.95); }
        .ticket-badge { background: #facc15; color: black; font-weight: 800; padding: 12px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(250, 204, 21, 0.3); }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-32">
    <div class="bg-glow"></div>

    <header class="text-center mt-10 mb-8">
        <div class="relative inline-block p-1 rounded-full bg-blue-500 shadow-lg">
            <img src="/logo2.png" alt="Brayan Lucena" class="w-24 h-24 rounded-full border-4 border-black object-cover bg-zinc-800">
        </div>
        <h1 class="text-3xl font-black mt-4 uppercase italic tracking-tighter">BRAYAN LUCENA</h1>
        <span class="bg-blue-600/20 text-blue-400 text-[10px] px-4 py-1.5 rounded-full font-black mt-2 inline-block border border-blue-600/30 uppercase tracking-widest">Sorteo Activo</span>
    </header>

    <div class="bento-card mb-8">
        <div class="bg-white p-6 flex justify-center items-center min-h-[200px]">
            <img src="/moto.png" alt="Bera SBR 2024" class="max-w-full h-auto drop-shadow-2xl">
        </div>
        
        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black italic uppercase">Bera SBR 2024</h2>
                    <p class="text-zinc-500 text-[10px] font-bold uppercase mt-1 tracking-widest">Sorteo Autorizado</p>
                </div>
                <div class="text-right">
                    <span class="text-blue-500 font-black text-3xl">310</span>
                    <span class="text-blue-500 font-bold text-sm block italic">Bs</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="generar(1)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm text-white hover:bg-white/10 transition-colors">1 Ticket</button>
                <button onclick="generar(3)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm text-white hover:bg-white/10 transition-colors">3 Tickets</button>
                <button onclick="generar(5)" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm text-white hover:bg-white/10 transition-colors">5 Tickets</button>
            </div>

            <button onclick="generar(1)" class="btn-luck w-full py-6 rounded-3xl font-black text-xl flex items-center justify-center gap-3 text-white">
                ¡DAME MI SUERTE!
            </button>
        </div>
    </div>

    <div id="box-suerte" class="hidden mb-12 text-center animate-bounce-short">
        <h3 class="text-zinc-500 text-xs font-bold uppercase mb-4">Tus números asignados:</h3>
        <div id="contenedor-num" class="flex flex-wrap justify-center gap-4"></div>
    </div>

    <div class="flex justify-around items-center opacity-40 grayscale brightness-200 px-4 mt-8">
        <img src="/pago1.png" alt="Pago" class="h-6">
        <img src="/pago2.png" alt="Pago" class="h-6">
        <img src="/pago3.png" alt="Pago" class="h-6">
    </div>

    <div id="barra" class="fixed bottom-0 left-0 w-full p-6 bg-black/95 border-t border-white/10 hidden z-50 backdrop-blur-md">
        <div class="max-w-md mx-auto flex justify-between items-center px-2">
            <div class="text-2xl font-black text-white"><span id="total">0</span> <span class="text-xs text-blue-400">Bs</span></div>
            <button onclick="alert('¡Excelente! Ahora reporta tu pago al WhatsApp.')" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-2xl font-black text-sm uppercase text-white shadow-lg transition-all">Continuar</button>
        </div>
    </div>

    <script>
        function generar(n) {
            const cont = document.getElementById('contenedor-num');
            cont.innerHTML = '';
            
            for(let i=0; i<n; i++) {
                // Generar número de 3 dígitos con ceros a la izquierda
                let num = Math.floor(Math.random()*1000).toString().padStart(3,'0');
                cont.innerHTML += `<div class="ticket-badge animate-pulse">#${num}</div>`;
            }
            
            document.getElementById('box-suerte').classList.remove('hidden');
            document.getElementById('barra').classList.remove('hidden');
            document.getElementById('total').innerText = (n * 310).toLocaleString();
            
            // Efecto de Confeti
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#1e40af', '#3b82f6', '#ffffff', '#facc15']
            });
        }
    </script>
</body>
</html>
