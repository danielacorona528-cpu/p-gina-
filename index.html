<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bera SBR 2026 - Brayan Lucena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 24px; }
        
        /* Botones de selección */
        .btn-select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 14px; font-weight: 900; font-size: 11px; cursor: pointer; transition: 0.2s; color: #71717a; text-align: center; }
        .btn-select.active { border-color: #3b82f6; background: rgba(37, 99, 235, 0.2); color: #3b82f6; transform: scale(1.05); }
        
        .btn-main { background: linear-gradient(135deg, #1e40af, #3b82f6); border-radius: 20px; padding: 18px; font-weight: 900; text-transform: uppercase; width: 100%; border: none; color: white; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-main:active { transform: scale(0.96); }

        .ticket-card { background: #facc15; color: #000; font-weight: 900; padding: 10px 18px; border-radius: 12px; margin: 5px; display: inline-block; transform: rotate(-1.5deg); box-shadow: 0 5px 15px rgba(250, 204, 21, 0.4); font-size: 1.2rem; }
        
        #admin-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-28">

    <div id="admin-view">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic text-blue-500 uppercase">Control de Ventas</h2>
            <button onclick="document.getElementById('admin-view').style.display='none'" class="text-red-500 font-bold bg-red-500/10 px-4 py-2 rounded-lg">CERRAR</button>
        </div>
        <div id="admin-stats" class="grid grid-cols-2 gap-4 mb-8 text-center"></div>
        <div id="admin-list" class="space-y-4"></div>
        <button onclick="if(confirm('¿BORRAR TODA LA DATA?')) { localStorage.clear(); location.reload(); }" class="w-full mt-12 p-4 border border-red-900 text-red-900 text-[10px] font-black uppercase tracking-widest">Borrar base de datos local</button>
    </div>

    <header class="text-center my-8">
        <div class="inline-block p-1 bg-blue-600 rounded-full mb-4 cursor-pointer" ondblclick="entrarAdmin()">
            <div class="w-24 h-24 rounded-full border-4 border-black bg-white overflow-hidden flex items-center justify-center shadow-lg">
                <img src="https://www.brayanlucena.com/img/logo.png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=BL&background=2563EB&color=fff'" class="w-full h-full object-cover">
            </div>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">BRAYAN LUCENA</h1>
        <p class="text-blue-500 text-[11px] font-black tracking-[0.5em] uppercase mt-2">Coroto de la Suerte</p>
    </header>

    <div class="glass p-5 mb-6">
        <div class="flex justify-between items-center mb-2">
            <span class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Cupos Disponibles</span>
            <span id="porc-txt" class="text-blue-400 font-black text-xs italic">Calculando...</span>
        </div>
        <div class="w-full h-2.5 bg-white/5 rounded-full overflow-hidden border border-white/5">
            <div id="porc-bar" class="h-full bg-blue-600 transition-all duration-1000 shadow-[0_0_10px_#2563eb]" style="width: 0%"></div>
        </div>
    </div>

    <div id="view-home">
        <div class="glass overflow-hidden mb-6 shadow-2xl">
            <div class="bg-white p-6 flex justify-center border-b border-white/5">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" alt="Bera SBR 2026" class="h-44 object-contain drop-shadow-2xl">
            </div>
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 class="text-xl font-black italic uppercase leading-none text-zinc-500">Bera SBR</h2>
                        <span class="text-white text-4xl font-black italic leading-none">2026</span>
                    </div>
                    <div class="text-right">
                        <span class="text-5xl font-black italic">310</span>
                        <span class="text-blue-500 text-[10px] font-black block italic uppercase">Bolívares</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-3 mb-8">
                    <button id="btn-1" onclick="cambiarCantidad(1)" class="btn-select active">1 TICKET</button>
                    <button id="btn-3" onclick="cambiarCantidad(3)" class="btn-select">3 TICKETS</button>
                    <button id="btn-5" onclick="cambiarCantidad(5)" class="btn-select">5 TICKETS</button>
                </div>
                
                <button onclick="darSuerte()" class="btn-main">¡Obtener mis Números!</button>
            </div>
        </div>

        <div class="glass p-8 mb-6 border-dashed border-white/10">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-5 text-center tracking-[0.3em]">Consulta de Tickets Real</h3>
            <div class="flex gap-2">
                <input type="text" id="input-busqueda" placeholder="Tu nombre completo..." class="flex-1 bg-black/40 p-4 rounded-xl text-sm text-white outline-none border border-white/10 focus:border-blue-500 transition-all font-bold">
                <button onclick="buscar()" class="bg-blue-600 px-6 rounded-xl text-[10px] font-black uppercase">Buscar</button>
            </div>
            <div id="res-busqueda" class="mt-6 flex flex-wrap justify-center gap-2"></div>
        </div>

        <div id="area-suerte" class="hidden text-center pb-12">
            <div id="lista-suerte" class="mb-6"></div>
        </div>
    </div>

    <div id="view-pago" class="hidden glass p-8 animate-pulse">
        <h2 class="text-3xl font-black uppercase text-blue-500 text-center mb-8 italic tracking-tighter">Confirmar Registro</h2>
        <div class="bg-black/40 p-6 rounded-2xl mb-8 border border-white/10 space-y-4 text-sm">
            <div class="flex justify-between"><span class="text-zinc-500 font-bold uppercase text-[10px]">Banco</span><strong>BANESCO</strong></div>
            <div class="flex justify-between"><span class="text-zinc-500 font-bold uppercase text-[10px]">Pago Móvil</span><strong>0412-1234567</strong></div>
            <div class="flex justify-between"><span class="text-zinc-500 font-bold uppercase text-[10px]">Cédula</span><strong>V-12.345.678</strong></div>
        </div>
        <input type="text" id="nombre-pago" placeholder="Escribe tu Nombre y Apellido" class="w-full bg-white/5 p-5 rounded-xl border border-white/10 mb-6 font-bold outline-none text-white focus:border-blue-500">
        <button onclick="finalizar()" class="btn-main">REPORTAR PAGO AHORA</button>
        <button onclick="location.reload()" class="w-full mt-4 text-[10px] text-zinc-600 font-black uppercase tracking-widest">Cancelar Proceso</button>
    </div>

    <div id="view-exito" class="hidden text-center">
        <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-600/30">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-3xl font-black uppercase italic mb-6 leading-none">¡TUS NÚMEROS HAN SIDO GUARDADOS!</h2>
        <div class="glass p-8 text-left mb-8">
            <p class="text-[10px] font-black text-zinc-500 uppercase mb-4 tracking-widest">Resumen de tu registro:</p>
            <div id="tks-finales" class="flex flex-wrap gap-2"></div>
        </div>
        <button onclick="location.reload()" class="btn-main">FINALIZAR Y SALIR</button>
    </div>

    <div id="footer-bar" class="fixed bottom-0 left-0 w-full p-6 bg-black/90 backdrop-blur-md border-t border-white/10 hidden z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="text-3xl font-black text-white"><span id="monto-txt">310</span> <span class="text-[10px] text-blue-500 italic">Bs</span></div>
            <button onclick="irAPagar()" class="bg-blue-600 px-12 py-4 rounded-xl font-black uppercase text-xs shadow-lg">Continuar</button>
        </div>
    </div>

    <script>
        const TOTAL = 10000;
        let db = JSON.parse(localStorage.getItem('bera_db_v2')) || { ventas: [], usados: [] };
        let cantidadSeleccionada = 1;
        let tempTickets = [];

        window.onload = () => updateProgreso();

        function updateProgreso() {
            const vendidos = db.usados.length;
            const libres = TOTAL - vendidos;
            const porc = ((libres / TOTAL) * 100).toFixed(1);
            document.getElementById('porc-bar').style.width = porc + '%';
            document.getElementById('porc-txt').innerText = porc + '% LIBRES';
        }

        function cambiarCantidad(n) {
            cantidadSeleccionada = n;
            document.querySelectorAll('.btn-select').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + n).classList.add('active');
            document.getElementById('area-suerte').classList.add('hidden');
            document.getElementById('footer-bar').classList.add('hidden');
            tempTickets = [];
        }

        function darSuerte() {
            tempTickets = [];
            const container = document.getElementById('lista-suerte');
            container.innerHTML = '<p class="text-[11px] font-black text-blue-500 mb-5 uppercase tracking-[0.2em]">Tus números asignados:</p>';
            
            while(tempTickets.length < cantidadSeleccionada) {
                let n = Math.floor(Math.random() * TOTAL).toString().padStart(4, '0');
                if (!db.usados.includes(n) && !tempTickets.includes(n)) {
                    tempTickets.push(n);
                    container.innerHTML += `<div class="ticket-card animate__animated animate__zoomIn">#${n}</div>`;
                }
            }

            document.getElementById('area-suerte').classList.remove('hidden');
            document.getElementById('footer-bar').classList.remove('hidden');
            document.getElementById('monto-txt').innerText = cantidadSeleccionada * 310;
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            confetti({ particleCount: 60, spread: 70, origin: { y: 0.9 } });
        }

        function irAPagar() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('footer-bar').classList.add('hidden');
            document.getElementById('view-pago').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function finalizar() {
            const nom = document.getElementById('nombre-pago').value.trim();
            if(!nom || nom.length < 3) return alert("Por favor, ingresa tu nombre completo.");

            // GUARDAR EN DB REAL (LOCAL)
            const nuevaVenta = { 
                nombre: nom, 
                tks: [...tempTickets], 
                monto: cantidadSeleccionada * 310,
                fecha: new Date().toLocaleString() 
            };
            
            db.ventas.push(nuevaVenta);
            db.usados.push(...tempTickets);
            localStorage.setItem('bera_db_v2', JSON.stringify(db));

            // MOSTRAR ÉXITO
            const divFinal = document.getElementById('tks-finales');
            divFinal.innerHTML = '';
            tempTickets.forEach(t => divFinal.innerHTML += `<span class="bg-blue-600/20 text-blue-400 border border-blue-500/20 px-4 py-2 rounded-lg font-black text-sm">#${t}</span>`);

            document.getElementById('view-pago').classList.add('hidden');
            document.getElementById('view-exito').classList.remove('hidden');
            updateProgreso();
            confetti({ particleCount: 150, spread: 80 });
        }

        function buscar() {
            const q = document.getElementById('input-busqueda').value.toLowerCase().trim();
            const res = document.getElementById('res-busqueda');
            res.innerHTML = '';
            if(!q) return;

            // BUSQUEDA TRANSPARENTE EN LA DB REAL
            const encontrados = db.ventas.filter(v => 
                v.nombre.toLowerCase().includes(q) || v.tks.includes(q)
            );
            
            if(encontrados.length > 0) {
                encontrados.forEach(v => {
                    v.tks.forEach(t => {
                        res.innerHTML += `<span class="bg-zinc-800 text-white px-4 py-2 rounded-xl text-xs font-black border border-white/5 shadow-lg">#${t}</span>`;
                    });
                });
            } else {
                res.innerHTML = '<span class="text-red-500 text-[10px] font-black uppercase tracking-widest italic">Ticket no encontrado en registros</span>';
            }
        }

        // PANEL ADMINISTRADOR
        function entrarAdmin() {
            if(prompt("Clave Maestro:") === "2026") {
                const modal = document.getElementById('admin-view');
                modal.style.display = 'block';
                
                const recaudo = db.ventas.reduce((acc, v) => acc + v.monto, 0);
                document.getElementById('admin-stats').innerHTML = `
                    <div class="glass p-6"><p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Total Vendidos</p><p class="text-3xl font-black">${db.usados.length}</p></div>
                    <div class="glass p-6"><p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Recaudado (Bs)</p><p class="text-3xl font-black text-green-500">${recaudo}</p></div>
                `;

                document.getElementById('admin-list').innerHTML = db.ventas.map(v => `
                    <div class="glass p-5 text-[11px] border-l-4 border-blue-600">
                        <div class="flex justify-between font-black text-blue-400 mb-2 uppercase"><span>${v.nombre}</span><span>${v.monto} Bs</span></div>
                        <div class="text-zinc-500 font-bold mb-2">${v.tks.join(' - ')}</div>
                        <div class="text-[9px] opacity-40 uppercase">${v.fecha}</div>
                    </div>
                `).reverse().join('');
            }
        }
    </script>
</body>
</html>
