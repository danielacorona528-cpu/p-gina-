<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brayan Lucena - Bera SBR 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            padding: 0;
            user-select: none;
        }
        
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 85%);
            z-index: -1;
        }

        .bento { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 32px; 
            backdrop-filter: blur(15px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .btn-select { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 18px; 
            padding: 16px; 
            font-weight: 900; 
            font-size: 11px; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-select:active { background: rgba(37, 99, 235, 0.3); transform: scale(0.92); }

        .btn-luck { 
            background: linear-gradient(135deg, #1e40af, #3b82f6); 
            border-radius: 24px; 
            padding: 20px; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-style: italic; 
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3); 
            width: 100%; 
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .ticket-badge { 
            background: #facc15; 
            color: #000; 
            font-weight: 900; 
            padding: 10px 18px; 
            border-radius: 12px; 
            margin: 5px; 
            display: inline-block; 
            transform: rotate(-1.5deg); 
            box-shadow: 0 6px 15px rgba(250, 204, 21, 0.3);
        }

        /* ESTILO RECIBO PREMIUM */
        .check-circle { 
            width: 80px; height: 80px; 
            background: #2563eb; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 24px; 
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
        }
        .receipt-line { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .receipt-label { color: #64748b; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; }
        .receipt-value { color: #fff; font-weight: 700; font-size: 15px; text-transform: uppercase; }
        .ticket-mini { background: #2563eb; color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 12px; margin-left: 6px; font-style: italic; }

        input[type="text"] { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 14px; color: white; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="max-w-md mx-auto p-5 pb-28">
    <div class="main-bg"></div>

    <header class="text-center my-10">
        <div class="relative inline-block p-1 bg-blue-600 rounded-full mb-5 cursor-pointer" ondblclick="abrirAdmin()">
            <img src="logo2 (1).png" alt="Brayan Lucena" class="w-28 h-28 rounded-full border-4 border-black object-cover bg-white shadow-2xl">
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">BRAYAN LUCENA</h1>
        <p class="text-blue-500 text-[11px] font-black tracking-[0.4em] uppercase mt-2">Coroto de la Suerte</p>
    </header>

    <div class="bento p-7 mb-8">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[11px] font-black uppercase text-zinc-500 tracking-widest">Disponibilidad</span>
            <span id="porc-txt" class="text-blue-400 font-black text-sm italic">Cargando...</span>
        </div>
        <div class="w-full h-3 bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">
            <div id="porc-bar" class="h-full bg-gradient-to-r from-blue-700 to-blue-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>

    <div id="view-home">
        <div class="bento overflow-hidden mb-8">
            <div class="bg-white p-5 flex justify-center">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" class="w-full h-auto">
            </div>
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <h2 class="text-2xl font-black italic
