<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio - Estilo Vercel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-8">
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full mx-auto mb-4 border-4 border-zinc-800 shadow-xl">
            <img src="https://via.placeholder.com/150" alt="Perfil" class="rounded-full w-full h-full object-cover">
        </div>
        <h1 class="text-2xl font-bold">Tu Nombre Aquí</h1>
        <p class="text-zinc-400">Creador de Contenido & Desarrollador</p>
    </div>

    <div class="w-full max-w-md space-y-4">
        
        <a href="https://instagram.com/tu-usuario" target="_blank" class="glass w-full py-4 px-6 rounded-2xl flex items-center justify-between group">
            <span class="font-medium">Instagram</span>
            <span class="opacity-50 group-hover:opacity-100">→</span>
        </a>

        <a href="https://tiktok.com/@tu-usuario" target="_blank" class="glass w-full py-4 px-6 rounded-2xl flex items-center justify-between group">
            <span class="font-medium">TikTok</span>
            <span class="opacity-50 group-hover:opacity-100">→</span>
        </a>

        <a href="https://youtube.com/tu-canal" target="_blank" class="glass w-full py-4 px-6 rounded-2xl flex items-center justify-between group">
            <span class="font-medium">YouTube</span>
            <span class="opacity-50 group-hover:opacity-100">→</span>
        </a>

        <a href="mailto:tu@correo.com" class="glass w-full py-4 px-6 rounded-2xl flex items-center justify-between group bg-white/10 border-white/20">
            <span class="font-medium font-bold text-blue-400">Contáctame</span>
            <span class="opacity-50 group-hover:opacity-100">✉️</span>
        </a>

    </div>

    <footer class="mt-12 text-zinc-600 text-sm">
        © 2024 Creado con ❤️
    </footer>

</body>
</html>
