<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorteo Bera SBR 2026 | Brayan Lucena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --accent: #fbbf24;
            --bg-dark: #0f172a;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Réplica de la Interfaz Profesional */
        .card-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .btn-qty {
            background: #1e293b;
            border: 2px solid transparent;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-qty.active {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
            color: white;
            transform: scale(1.05);
        }

        /* Ticket Estilo "Brayan Lucena" */
        .ticket-item {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #000;
            font-weight: 900;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
            text-align: center;
            font-size: 1.1rem;
        }

        /* Panel Admin */
        #admin-panel {
            display: none; position: fixed; inset: 0; background: #020617; 
            z-index: 9999; overflow-y: auto; padding: 20px;
        }

        input:focus { border-color: var(--primary); outline: none; }
    </style>
</head>
<body class="max-w-xl mx-auto pb-20">

    <nav class="p-6 flex justify-between items-center border-b border-white/5 mb-8">
        <div class="flex items-center gap-3 cursor-pointer" ondblclick="abrirControl()">
            <img src="logo2 (1).png" alt="BL" onerror="this.src='https://ui-avatars.com/api/?name=BL&background=2563EB&color=fff'" class="w-12 h-12 rounded-full border-2 border-blue-600">
            <div>
                <h1 class="font-black text-lg leading-none uppercase">Brayan Lucena</h1>
                <span class="text-[10px] text-blue-500 font-bold tracking-widest uppercase">Sorteos Oficiales</span>
            </div>
        </div>
        <button onclick="document.getElementById('seccion-consulta').scrollIntoView({behavior:'smooth'})" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-full border border-white/10">MIS TICKETS</button>
    </nav>

    <div class="px-4 mb-8">
        <div class="card-glass overflow-hidden shadow-2xl">
            <div class="bg-white p-6 flex justify-center items-center">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" alt="Bera SBR" class="h-56 object-contain drop-shadow-2xl">
            </div>
            <div class="p-8">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <span class="bg-blue-600 text-[9px] font-black px-2 py-1 rounded-md uppercase tracking-tighter">Gran Sorteo 2026</span>
                        <h2 class="text-3xl font-black italic uppercase mt-2">Bera SBR <span class="text-blue-500">2026</span></h2>
                    </div>
                    <div class="text-right">
                        <p class="text-zinc-500 text-[10px] font-bold uppercase">Precio</p>
                        <p class="text-4xl font-black text-white">310<span class="text-blue-500 text-sm">Bs</span></p>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3 mb-8">
                    <button id="q1" onclick="seleccionar(1)" class="btn-qty active p-4 rounded-2xl flex flex-col items-center">
                        <span class="text-xl font-black">1</span>
                        <span class="text-[9px] font-bold uppercase opacity-60">Ticket</span>
                    </button>
                    <button id="q3" onclick="seleccionar(3)" class="btn-qty p-4 rounded-2xl flex flex-col items-center">
                        <span class="text-xl font-black">3</span>
                        <span class="text-[9px] font-bold uppercase opacity-60">Tickets</span>
                    </button>
                    <button id="q5" onclick="seleccionar(5)" class="btn-qty p-4 rounded-2xl flex flex-col items-center">
                        <span class="text-xl font-black">5</span>
                        <span class="text-[9px] font-bold uppercase opacity-60">Tickets</span>
                    </button>
                </div>

                <button onclick="generarNumeros()" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-600/20 transition-all active:scale-95 uppercase italic">
                    ¡Reservar mis Números!
                </button>
            </div>
        </div>
    </div>

    <div id="display-numeros" class="hidden px-4 mb-10 text-center scale-up">
        <h3 class="text-blue-500 font-black uppercase text-xs tracking-widest mb-4">Tus números de la suerte</h3>
        <div id="lista-tickets" class="flex flex-wrap justify-center gap-3"></div>
    </div>

    <div id="seccion-consulta" class="px-4 mb-12">
        <div class="card-glass p-8 border-dashed border-white/20">
            <h3 class="text-center font-black uppercase text-xs text-zinc-500 tracking-[0.3em] mb-6">Verificar disponibilidad real</h3>
            <div class="flex gap-2 mb-4">
                <input type="text" id="input-buscar" placeholder="Ingresa tu nombre o número..." class="flex-1 bg-black/40 p-4 rounded-xl border border-white/10 text-sm">
                <button onclick="buscarTickets()" class="bg-zinc-800 px-6 rounded-xl font-black uppercase text-[10px]">Buscar</button>
            </div>
            <div id="resultados-busqueda" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
    </div>

    <div id="footer-compra" class="fixed bottom-0 left-0 w-full p-5 bg-slate-900/90 backdrop-blur-md border-t border-white/10 hidden z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-zinc-500 font-bold uppercase">Total a pagar</p>
                <p class="text-2xl font-black text-white"><span id="total-bs">310</span> Bs</p>
            </div>
            <button onclick="abrirPago()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase text-sm shadow-lg">Continuar</button>
        </div>
    </div>

    <div id="modal-pago" class="fixed inset-0 bg-black/95 z-[100] hidden p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <h2 class="text-2xl font-black uppercase text-blue-500 italic mb-8">Paso Final: Registro</h2>
            
            <div class="card-glass p-6 mb-6 space-y-4">
                <p class="text-xs text-zinc-500 font-bold uppercase">Datos de transferencia:</p>
                <div class="flex justify-between border-b border-white/5 pb-2"><span>Banco:</span><strong>BANESCO</strong></div>
                <div class="flex justify-between border-b border-white/5 pb-2"><span>Pago Móvil:</span><strong>0412-1234567</strong></div>
                <div class="flex justify-between"><span>CI:</span><strong>V-12.345.678</strong></div>
            </div>

            <div class="space-y-4">
                <input type="text" id="reg-nombre" placeholder="Nombre y Apellido" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-bold">
                <input type="tel" id="reg-tel" placeholder="WhatsApp (Ej: 04141234567)" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-bold">
                <button onclick="confirmarVenta()" class="w-full bg-green-600 py-5 rounded-2xl font-black text-white uppercase shadow-lg shadow-green-600/20">Registrar Pago</button>
                <button onclick="document.getElementById('modal-pago').classList.add('hidden')" class="w-full py-4 text-zinc-500 font-bold uppercase text-[10px]">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black text-blue-500 uppercase italic">Control de Ventas</h2>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="text-red-500">CERRAR</button>
        </div>
        <div id="admin-stats" class="grid grid-cols-2 gap-4 mb-8 text-center"></div>
        <div id="admin-ventas" class="space-y-4"></div>
        <button onclick="resetSystem()" class="w-full mt-20 text-[10px] text-red-900 font-black border border-red-900 p-4">BORRAR TODO EL HISTORIAL</button>
    </div>

    <script>
        // Lógica de Negocio Real
        let db = JSON.parse(localStorage.getItem('sorteo_bera_2026')) || { ventas: [], usados: [] };
        let seleccionActual = 1;
        let tksGenerados = [];

        function seleccionar(n) {
            seleccionActual = n;
            document.querySelectorAll('.btn-qty').forEach(b => b.classList.remove('active'));
            document.getElementById('q' + n).classList.add('active');
            document.getElementById('display-numeros').classList.add('hidden');
            document.getElementById('footer-compra').classList.add('hidden');
        }

        function generarNumeros() {
            tksGenerados = [];
            const lista = document.getElementById('lista-tickets');
            lista.innerHTML = '';

            for(let i=0; i<seleccionActual; i++) {
                let num;
                do {
                    num = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                } while (db.usados.includes(num) || tksGenerados.includes(num));
                
                tksGenerados.push(num);
                lista.innerHTML += `<div class="ticket-item animate-pulse">#${num}</div>`;
            }

            document.getElementById('display-numeros').classList.remove('hidden');
            document.getElementById('footer-compra').classList.remove('hidden');
            document.getElementById('total-bs').innerText = seleccionActual * 310;
            
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.9 } });
        }

        function abrirPago() {
            document.getElementById('modal-pago').classList.remove('hidden');
        }

        function confirmarVenta() {
            const nom = document.getElementById('reg-nombre').value.trim();
            const tel = document.getElementById('reg-tel').value.trim();
            
            if(!nom || !tel) return alert("Por favor completa tus datos.");

            const nuevaVenta = {
                id: Date.now(),
                nombre: nom,
                whatsapp: tel,
                tickets: [...tksGenerados],
                total: seleccionActual * 310,
                fecha: new Date().toLocaleString()
            };

            db.ventas.push(nuevaVenta);
            db.usados.push(...tksGenerados);
            localStorage.setItem('sorteo_bera_2026', JSON.stringify(db));

            // Simulación de éxito
            alert("¡Registro Exitoso! Tus números están asegurados.");
            location.reload();
        }

        function buscarTickets() {
            const q = document.getElementById('input-buscar').value.toLowerCase().trim();
            const res = document.getElementById('resultados-busqueda');
            res.innerHTML = '';
            if(!q) return;

            const encontrados = db.ventas.filter(v => 
                v.nombre.toLowerCase().includes(q) || v.tickets.includes(q)
            );

            if(encontrados.length > 0) {
                encontrados.forEach(v => {
                    v.tickets.forEach(t => {
                        res.innerHTML += `<span class="bg-blue-600 text-white px-3 py-1 rounded-md text-xs font-black">#${t}</span>`;
                    });
                });
            } else {
                res.innerHTML = '<span class="text-red-500 text-xs font-bold uppercase">Sin registros reales</span>';
            }
        }

        // PANEL DE CONTROL
        function abrirControl() {
            if(prompt("Clave de Admin:") === "2026") {
                const p = document.getElementById('admin-panel');
                p.style.display = 'block';
                
                const recaudado = db.ventas.reduce((acc, v) => acc + v.total, 0);
                document.getElementById('admin-stats').innerHTML = `
                    <div class="card-glass p-5">
                        <p class="text-[10px] text-zinc-500 font-bold">VENDIDOS</p>
                        <p class="text-3xl font-black">${db.usados.length}</p>
                    </div>
                    <div class="card-glass p-5">
                        <p class="text-[10px] text-zinc-500 font-bold">RECAUDADO</p>
                        <p class="text-3xl font-black text-green-500">${recaudado} Bs</p>
                    </div>
                `;

                document.getElementById('admin-ventas').innerHTML = db.ventas.map(v => `
                    <div class="card-glass p-4 text-[11px] border-l-4 border-blue-500">
                        <div class="flex justify-between font-black mb-1">
                            <span>${v.nombre}</span>
                            <span class="text-blue-400">${v.total} Bs</span>
                        </div>
                        <div class="text-zinc-500">${v.tickets.join(' - ')}</div>
                        <div class="text-[9px] mt-2 opacity-50">${v.whatsapp} | ${v.fecha}</div>
                    </div>
                `).reverse().join('');
            }
        }

        function resetSystem() {
            if(confirm("¿Eliminar todas las ventas registradas?")) {
                localStorage.removeItem('sorteo_bera_2026');
                location.reload();
            }
        }
    </script>
</body>
</html>
