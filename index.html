<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brayan Lucena - Bera SBR 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden; 
        }

        .main-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 85%); 
            z-index: -1; 
        }

        .bento { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 32px; 
            backdrop-filter: blur(15px); 
        }

        /* Botones de Selección */
        .btn-select { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 18px; padding: 16px; 
            font-weight: 900; font-size: 11px; 
            cursor: pointer; transition: all 0.2s;
            color: #71717a;
        }
        .btn-select.active { 
            border-color: #3b82f6; 
            background: rgba(37, 99, 235, 0.2); 
            color: #3b82f6; 
            transform: scale(1.05);
        }

        /* Botón Principal */
        .btn-luck { 
            background: linear-gradient(135deg, #1e40af, #3b82f6); 
            border-radius: 24px; padding: 20px; 
            font-weight: 900; text-transform: uppercase; 
            font-style: italic; width: 100%; border: none; 
            color: white; cursor: pointer; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); 
        }
        .btn-luck:active { transform: scale(0.98); }

        .ticket-badge { 
            background: #facc15; color: #000; 
            font-weight: 900; padding: 10px 18px; 
            border-radius: 12px; margin: 5px; 
            display: inline-block; transform: rotate(-1.5deg); 
            box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3); 
        }
        
        .ticket-mini { 
            background: #2563eb; color: #fff; 
            padding: 4px 10px; border-radius: 8px; 
            font-weight: 900; font-size: 11px; margin: 2px; 
        }

        /* Animaciones */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Panel Admin */
        #admin-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; overflow-y: auto;
        }
    </style>
</head>
<body class="max-w-md mx-auto p-5 pb-32">
    <div class="main-bg"></div>

    <div id="admin-modal" class="fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black italic">CONTROL DE VENTAS</h2>
            <button onclick="cerrarAdmin()" class="text-red-500 font-bold">CERRAR</button>
        </div>
        <div id="admin-stats" class="grid grid-cols-2 gap-4 mb-6"></div>
        <div id="admin-ventas" class="space-y-4"></div>
        <button onclick="borrarTodo()" class="w-full mt-10 p-4 border border-red-500 text-red-500 rounded-2xl text-[10px] font-bold">RESETEAR BASE DE DATOS</button>
    </div>

    <header class="text-center my-10">
        <div class="relative inline-block p-1 bg-blue-600 rounded-full mb-5 cursor-pointer" ondblclick="abrirAdmin()">
            <div class="w-28 h-28 rounded-full border-4 border-black bg-white overflow-hidden flex items-center justify-center">
                <img src="logo2 (1).png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=BL&background=0D8ABC&color=fff'" class="w-full h-full object-cover">
            </div>
            <div class="absolute bottom-1 right-2 w-6 h-6 bg-green-500 border-4 border-black rounded-full"></div>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">BRAYAN LUCENA</h1>
        <p class="text-blue-500 text-[11px] font-black tracking-[0.4em] uppercase mt-2">Coroto de la Suerte</p>
    </header>

    <div class="bento p-7 mb-8">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[11px] font-black uppercase text-zinc-500">Disponibilidad</span>
            <span id="porc-txt" class="text-blue-400 font-black text-sm italic">Cargando...</span>
        </div>
        <div class="w-full h-3 bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">
            <div id="porc-bar" class="h-full bg-blue-600 rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
