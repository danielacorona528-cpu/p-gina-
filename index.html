<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Brillantes - ¡Gana Ya!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        .gradiente-animado {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .ticket {
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 800; cursor: pointer;
            border: 2px solid #222; background: #111; transition: 0.3s;
        }
        .ticket.selected { 
            background: #facc15; border-color: #fff; color: #000;
            transform: scale(1.1) rotate(5deg); box-shadow: 0 0 20px #facc15;
        }
        .bento { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-24">

    <div id="vista-seleccion">
        <header class="text-center py-8">
            <div class="inline-block p-1 rounded-full bg-gradient-to-r from-yellow-400 to-orange-500 mb-4">
                <img src="https://via.placeholder.com/100" class="w-20 h-20 rounded-full border-4 border-black">
            </div>
            <h1 class="text-3xl font-black tracking-tighter italic">¡SORTEO DE INFARTO! 🚀</h1>
            <p class="text-yellow-400 font-bold text-sm">Escoge tus números y conviértete en ganador</p>
        </header>

        <div class="bento p-4 mb-6 border-yellow-500/30">
            <h3 class="text-xs font-bold mb-2 uppercase text-zinc-400"><i class="fa-solid fa-magnifying-glass"></i> ¿Ya compraste? Verifica aquí:</h3>
            <div class="flex gap-2">
                <input id="input-verify" type="number" placeholder="Tu número (Ej: 025)" class="flex-1 bg-black/50 border border-zinc-700 p-2 rounded-lg text-sm">
                <button onclick="verificarTicket()" class="bg-zinc-800 px-4 rounded-lg text-xs font-bold">REVISAR</button>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-3" id="grid-tickets"></div>

        <div id="barra-pago" class="fixed bottom-0 left-0 w-full bg-black/90 p-5 border-t-2 border-yellow-500 hidden z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <div>
                    <p class="text-[10px] uppercase font-black text-yellow-500">Tickets listos</p>
                    <p class="text-2xl font-black">Total: $<span id="monto-total">0</span></p>
                </div>
                <button onclick="irAPagar()" class="bg-yellow-400 text-black px-8 py-3 rounded-2xl font-black shadow-lg shadow-yellow-500/20">
                    ¡COMPRAR YA!
                </button>
            </div>
        </div>
    </div>

    <div id="vista-pago" class="hidden">
        <button onclick="regresar()" class="text-zinc-500 mb-6 font-bold"><i class="fa-solid fa-chevron-left"></i> REGRESAR</button>
        
        <div class="bento p-6 mb-6 gradiente-animado border-none shadow-2xl">
            <h2 class="text-2xl font-black mb-2">PAGO MÓVIL 💸</h2>
            <div class="space-y-1 font-bold text-black/80">
                <p>BANCO: BANESCO</p>
                <p>TEL: 0412-0000000</p>
                <p>CI: 00.000.000</p>
            </div>
        </div>

        <form id="pago-form" onsubmit="finalizar(event)" class="space-y-4">
            <div class="bento p-5">
                <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase">Tu Nombre Completo</label>
                <input type="text" required class="w-full bg-black/40 border border-zinc-800 p-3 rounded-xl outline-none focus:border-yellow-500">
                
                <label class="block text-xs font-bold text-zinc-400 mt-4 mb-2 uppercase">Adjuntar Captura de Pago</label>
                <input type="file" accept="image/*" required class="w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-yellow-400 file:text-black">
            </div>
            
            <button type="submit" class="w-full bg-green-500 py-5 rounded-2xl font-black text-xl shadow-xl shadow-green-500/20">
                CONFIRMAR MI PAGO ✅
            </button>
        </form>
    </div>

    <div id="vista-exito" class="hidden text-center py-20">
        <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-green-500/40">
            <i class="fa-solid fa-check text-4xl text-black"></i>
        </div>
        <h2 class="text-3xl font-black mb-2">¡RECIBIDO!</h2>
        <p class="text-zinc-400 px-10">Tu pago ha sido cargado exitosamente. En breve verificaremos tus números.</p>
        <button onclick="location.reload()" class="mt-10 bg-zinc-900 px-8 py-3 rounded-xl font-bold border border-zinc-800">Cerrar</button>
    </div>

    <script>
        let seleccionados = [];
        const precio = 5;
        const grid = document.getElementById('grid-tickets');

        // Crear 100 números
        for(let i=1; i<=100; i++){
            let n = i.toString().padStart(3,'0');
            let d = document.createElement('div');
            d.className = 'ticket'; d.innerText = n;
            d.onclick = () => {
                if(seleccionados.includes(n)) {
                    seleccionados = seleccionados.filter(x => x !== n);
                    d.classList.remove('selected');
                } else {
                    seleccionados.push(n);
                    d.classList.add('selected');
                }
                actualizar();
            }
            grid.appendChild(d);
        }

        function actualizar() {
            document.getElementById('barra-pago').style.display = seleccionados.length ? 'block' : 'none';
            document.getElementById('monto-total').innerText = seleccionados.length * precio;
        }

        function irAPagar() {
            document.getElementById('vista-seleccion').classList.add('hidden');
            document.getElementById('vista-pago').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function regresar() {
            document.getElementById('vista-p
