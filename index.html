<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brayan Lucena - Bera SBR 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
            margin: 0;
            padding: 0;
        }

        .bg-glow { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 85%); 
            z-index: -1; 
        }

        .bento-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 28px; 
            backdrop-filter: blur(12px); 
        }

        /* Botón Principal */
        .btn-luck { 
            background: linear-gradient(90deg, #1e40af, #3b82f6); 
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); 
            border: none;
            transition: transform 0.2s;
        }
        .btn-luck:active { transform: scale(0.95); }

        /* Tickets Generados */
        .ticket-badge { 
            background: #facc15; color: black; font-weight: 900; 
            padding: 10px 18px; border-radius: 14px; margin: 4px; 
            display: inline-block; transform: rotate(-1deg); 
            animation: pop 0.3s ease forwards;
        }

        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1) rotate(-1deg); } }

        /* Barra de Progreso */
        .progress-fill { transition: width 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1); }

        /* ESTILO ESPECÍFICO /COMPRA/323 */
        .check-circle { 
            width: 72px; height: 72px; background: #2563eb; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 24px; 
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.5); 
        }
        .info-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .info-label { color: #94a3b8; text-transform: uppercase; font-size: 10px; font-weight: 900; letter-spacing: 0.1em; }
        .info-value { font-weight: 700; color: #fff; font-size: 14px; text-transform: uppercase; }
        
        .ticket-mini { 
            background: #2563eb; color: white; padding: 4px 10px; 
            border-radius: 8px; font-weight: 900; font-size: 12px; font-style: italic; 
        }

        /* Admin Layout */
        .admin-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

    <div class="bg-glow"></div>

    <header id="header-main" class="text-center mt-6 mb-8">
        <div class="relative inline-block p-1 rounded-full bg-blue-600 shadow-lg mb-4 cursor-pointer" ondblclick="abrirAdmin()">
            <img src="logo2 (1).png" alt="Logo" class="w-24 h-24 rounded-full border-4 border-black object-cover bg-white">
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">BRAYAN LUCENA</h1>
        <p class="text-blue-400 text-[10px] font-black tracking-[0.3em] uppercase">Coroto de la Suerte</p>
    </header>

    <div id="panel-progreso" class="bento-card p-6 mb-6">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black uppercase text-zinc-400">Disponibilidad</span>
            <span class="text-blue-400 font-black text-sm" id="txt-porcentaje">100% Libres</span>
        </div>
        <div class="w-full h-3 bg-white/10 rounded-full overflow-hidden p-0.5">
