<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 50% -20%, #1a1a1a, transparent),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .bento-item {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease-in-out;
        }

        .bento-item:active {
            transform: scale(0.97);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-6">

    <div class="mt-12 text-center w-full">
        <div class="relative inline-block">
            <img src="https://via.placeholder.com/150" alt="Profile" 
                 class="w-24 h-24 rounded-full border-[1px] border-white/20 p-1">
        </div>
        <h1 class="text-2xl font-extrabold mt-4 tracking-tight">Tu Nombre</h1>
        <p class="text-zinc-500 text-sm font-medium mt-1 mb-10 uppercase tracking-widest">Creador de Contenido</p>
    </div>

    <div class="w-full max-w-[400px] space-y-4">
        
        <a href="#" class="bento-item p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="icon-box">
                    <i class="fab fa-instagram text-xl"></i>
                </div>
                <div>
                    <h3 class="text-[15px] font-semibold">Instagram</h3>
                    <p class="text-xs text-zinc-500">Sígueme para ver mi día a día</p>
                </div>
            </div>
            <i class="fa-solid fa-arrow-up-right-from-square text-zinc-600 text-[10px] mr-2"></i>
        </a>

        <a href="#" class="bento-item p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="icon-box">
                    <i class="fab fa-tiktok text-xl"></i>
                </div>
                <div>
                    <h3 class="text-[15px] font-semibold">TikTok</h3>
                    <p class="text-xs text-zinc-500">Videos cortos y trends</p>
                </div>
            </div>
            <i class="fa-solid fa-arrow-up-right-from-square text-zinc-600 text-[10px] mr-2"></i>
        </a>

        <a href="#" class="bento-item p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="icon-box">
                    <i class="fab fa-youtube text-xl text-red-600"></i>
                </div>
                <div>
                    <h3 class="text-[15px] font-semibold">YouTube</h3>
                    <p class="text-xs text-zinc-500">Tutoriales y Vlogs</p>
                </div>
            </div>
            <i class="fa-solid fa-arrow-up-right-from-square text-zinc-600 text-[10px] mr-2"></i>
        </a>

        <a href="#" class="bento-item p-4 flex items-center justify-between border-white/20">
            <div class="flex items-center gap-4">
                <div class="icon-box bg-white">
                    <i class="fa-brands fa-whatsapp text-xl text-black"></i>
                </div>
                <div>
                    <h3 class="text-[15px] font-bold text-white">Contáctame</h3>
                    <p class="text-xs text-zinc-500 italic">Hablemos por aquí</p>
                </div>
            </div>
            <div class="bg-green-500 w-2 h-2 rounded-full animate-pulse mr-3"></div>
        </a>

    </div>

    <footer class="mt-auto py-12">
        <p class="text-[10px] text-zinc-600 tracking-tighter uppercase font-bold">
            © 2026 Crafted with Passion
        </p>
    </footer>

</body>
</html>
