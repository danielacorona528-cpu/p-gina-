<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Brayan Lucena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; }
        
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #001f3f 0%, #050505 85%);
            z-index: -1;
        }

        .bento-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            backdrop-filter: blur(12px);
        }

        .btn-luck {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .ticket-badge {
            background: #facc15;
            color: black;
            font-weight: 800;
            padding: 12px 20px;
            border-radius: 15px;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.3); }
            to { opacity: 1; transform: scale(1); }
        }

        .hidden { display: none; }
    </style>
</head>

            </div>
            <h1 class="text-3xl font-black mt-4 tracking-tighter uppercase italic">BRAYAN LUCENA</h1>

                Gran Sorteo Activo
            </span>
        </header>
