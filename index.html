<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brayan Lucena | Bera SBR 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');
        
        :root {
            --accent: #2563eb;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Fondo dinámico */
        .bg-glow { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 85%); 
            z-index: -1; 
        }

        /* Bento Cards */
        .bento-card { 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            border-radius: 32px; 
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease;
        }

        /* Botones Premium */
        .btn-luck { 
            background: linear-gradient(135deg, #1e40af, #3b82f6); 
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
        }
        .btn-luck:active { transform: scale(0.96); opacity: 0.9; }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: all 0.2s;
        }
        .btn-ghost:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.95); }

        /* Estilo Tickets */
        .ticket-badge { 
            background: #facc15; color: black; font-weight: 900; 
            padding: 12px 20px; border-radius: 16px; margin: 6px; 
            display: inline-block; transform: rotate(-1.5deg); 
            box-shadow: 0 8px 20px rgba(250, 204, 21, 0.3);
            animation: ticketPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes ticketPop { from { transform: scale(0) rotate(10deg); opacity: 0; } to { transform: scale(1) rotate(-1.5deg); opacity: 1; } }

        /* Barra de Progreso */
        .progress-container { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); border-radius: 50px; padding: 4px; }
        .progress-fill { height: 10px; border-radius: 50px; background: linear-gradient(90deg, #1e40af, #3b82f6); transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1); }

        /* VISTA ÉXITO ESTILO /COMPRA/323 */
        .check-icon-container {
            width: 80px; height: 80px; background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; box-shadow: 0 20px 40px rgba(37, 99, 235, 0.4);
        }
        .receipt-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .receipt-label { color: #64748b; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .receipt-value { font-weight: 700; color: #f8fafc; font-size: 14px; text-transform: uppercase; }
        .ticket-pill { background: #2563eb; color: white; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-style: italic; font-size: 12px; }

        /* Ocultar scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
