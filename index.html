<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bera SBR 2026 - Brayan Lucena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 24px; }
        
        /* Estilos de botones corregidos */
        .btn-select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 14px; font-weight: 900; font-size: 11px; cursor: pointer; transition: 0.2s; color: #71717a; }
        .btn-select.active { border-color: #3b82f6; background: rgba(37, 99, 235, 0.2); color: #3b82f6; transform: scale(1.05); }
        
        .btn-main { background: linear-gradient(135deg, #1e40af, #3b82f6); border-radius: 20px; padding: 18px; font-weight: 900; text-transform: uppercase; width: 100%; border: none; color: white; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-main:active { transform: scale(0.96); }

        .ticket-card { background: #facc15; color: #000; font-weight: 900; padding: 8px 15px; border-radius: 10px; margin: 4px; display: inline-block; transform: rotate(-1deg); box-shadow: 0 4px 10px rgba(250, 204, 21, 0.3); }
        
        #admin-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 pb-28">

    <div id="admin-view">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black italic text-blue-500">VENTAS REALES</h2>
            <button onclick="document.getElementById('admin-view').style.display='none'" class="text-red-500 font-bold">CERRAR</button>
        </div>
        <div id="admin-stats" class="grid grid-cols-2 gap-4 mb-6 text-center"></div>
        <div id="admin-list" class="space-y-3"></div>
        <button onclick="if(confirm('¿Borrar todo?')) { localStorage.clear(); location.reload(); }" class="w-full mt-10 p-3 border border-red-900 text-red-900 text-[10px] font-bold">BORRAR TODA LA DATA</button>
    </div>

    <header class="text-center my-8">
        <div class="inline-block p-1 bg-blue-600 rounded-full mb-4 cursor-pointer" ondblclick="entrarAdmin()">
            <div class="w-24 h-24 rounded-full border-4 border-black bg-white overflow-hidden flex items-center justify-center">
                <img src="logo2 (1).png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=BL&background=0D8ABC&color=fff'" class="w-full h-full object-cover">
            </div>
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">BRAYAN LUCENA</h1>
        <p class="text-blue-500 text-[10px] font-black tracking-[0.4em] uppercase mt-1">Coroto de la Suerte</p>
    </header>

    <div class="glass p-5 mb-6">
        <div class="flex justify-between items-center mb-2">
            <span class="text-[10px] font-black uppercase text-zinc-500">Números Libres</span>
            <span id="porc-txt" class="text-blue-400 font-black text-xs italic">Cargando...</span>
        </div>
        <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden border border-white/5">
            <div id="porc-bar" class="h-full bg-blue-600 transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>

    <div id="view-home">
        <div class="glass overflow-hidden mb-6">
            <div class="bg-white p-4 flex justify-center">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" class="h-40 object-contain">
            </div>
            <div class="p-6">
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-xl font-black italic uppercase leading-none text-zinc-400">Bera SBR<br><span class="text-white text-3xl italic">2026</span></h2>
                    <div class="text-right"><span class="text-4xl font-black">310</span><span class="text-blue-500 text-[10px] font-black block italic">Bs</span></div>
                </div>
                
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button id="btn-1" onclick="cambiarCantidad(1)" class="btn-select active">1 TICKET</button>
                    <button id="btn-3" onclick="cambiarCantidad(3)" class="btn-select">3 TICKETS</button>
                    <button id="btn-5" onclick="cambiarCantidad(5)" class="btn-select">5 TICKETS</button>
                </div>
                
                <button onclick="darSuerte()" class="btn-main">OBTENER MIS NÚMEROS</button>
            </div>
        </div>

        <div class="glass p-6 mb-6">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 text-center">Consulta Transparente</h3>
            <div class="flex gap-2">
                <input type="text" id="input-busqueda" placeholder="Escribe tu nombre..." class="flex-1 bg-white/5 p-4 rounded-xl text-xs text-white outline-none border border-white/5 focus:border-blue-500 transition-all">
                <button onclick="buscar()" class="bg-blue-600 px-6 rounded-xl text-[10px] font-black uppercase">Buscar</button>
            </div>
            <div id="res-busqueda" class="mt-4 flex flex-wrap justify-center gap-1"></div>
        </div>

        <div id="area-suerte" class="hidden text-center pb-10">
            <div id="lista-suerte"></div>
        </div>
    </div>

    <div id="view-pago" class="hidden glass p-8">
        <h2 class="text-2xl font-black uppercase text-blue-500 text-center mb-8 italic tracking-tighter">Confirmar Registro</h2>
        <div class="bg-black/40 p-5 rounded-2xl mb-6 border border-white/5 space-y-3 text-sm">
            <div class="flex justify-between"><span class="text-zinc-500 font-bold uppercase text-[10px]">Banco</span><strong>BANESCO</strong></div>
            <div class="flex justify-between"><span class="text-zinc-500 font-bold uppercase text-[10px]">Pago Móvil</span><strong>0412-1234567</strong></div>
        </div>
        <input type="text" id="nombre-pago" placeholder="Nombre completo" class="w-full bg-white/5 p-5 rounded-xl border border-white/10 mb-4 font-bold outline-none text-white">
        <button onclick="finalizar()" class="btn-main">REPORTAR PAGO</button>
        <button onclick="location.reload()" class="w-full mt-4 text-[10px] text-zinc-600 font-bold uppercase">Cancelar</button>
    </div>

    <div id="view-exito" class="hidden text-center">
        <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2
