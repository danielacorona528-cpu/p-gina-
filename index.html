<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brayan Lucena - Bera SBR 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .main-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #002d5a 0%, #050505 85%); z-index: -1; }
        .bento { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .btn-luck { background: linear-gradient(135deg, #1e40af, #3b82f6); border-radius: 24px; padding: 20px; font-weight: 900; text-transform: uppercase; font-style: italic; width: 100%; border: none; color: white; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        .ticket-badge { background: #facc15; color: #000; font-weight: 900; padding: 10px 18px; border-radius: 12px; margin: 5px; display: inline-block; transform: rotate(-1.5deg); }
        .ticket-mini { background: #2563eb; color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 11px; margin: 2px; }
        .receipt-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="max-w-md mx-auto p-5 pb-28">
    <div class="main-bg"></div>

    <header class="text-center my-10">
        <div class="relative inline-block p-1 bg-blue-600 rounded-full mb-5 cursor-pointer" ondblclick="abrirAdmin()">
            <div class="w-28 h-28 rounded-full border-4 border-black bg-white overflow-hidden flex items-center justify-center">
                <img src="logo2 (1).png" alt="Brayan Lucena" onerror="this.src='https://ui-avatars.com/api/?name=BL&background=0D8ABC&color=fff'" class="w-full h-full object-cover">
            </div>
            <div class="absolute bottom-1 right-2 w-6 h-6 bg-green-500 border-4 border-black rounded-full"></div>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">BRAYAN LUCENA</h1>
        <p class="text-blue-500 text-[11px] font-black tracking-[0.4em] uppercase mt-2">Coroto de la Suerte</p>
    </header>

    <div class="bento p-7 mb-8">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[11px] font-black uppercase text-zinc-500">Disponibilidad</span>
            <span id="porc-txt" class="text-blue-400 font-black text-sm italic">Cargando...</span>
        </div>
        <div class="w-full h-3 bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">
            <div id="porc-bar" class="h-full bg-blue-600 rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>

    <div id="view-home">
        <div class="bento overflow-hidden mb-8">
            <div class="bg-white p-5 flex justify-center">
                <img src="https://brayanlucena2.vercel.app/jYnRXmHtVLBqGjKhRB2ZmDEJZTpMIGaN2u4iH1Js.png" class="w-full h-auto" alt="Moto">
            </div>
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <h2 class="text-2xl font-black italic uppercase leading-tight">Bera SBR<br><span class="text-blue-500">2026</span></h2>
                    <div class="text-right"><span class="text-4xl font-black">310</span><span class="text-blue-500 text-[10px] font-black block italic uppercase">Bs</span></div>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button onclick="generar(1)" class="bg-white/5 border border-white/10 rounded-xl p-4 font-black text-[10px]">1 TICKET</button>
                    <button onclick="generar(3)" class="bg-white/5 border border-white/10 rounded-xl p-4 font-black text-[10px]">3 TICKETS</button>
                    <button onclick="generar(5)" class="bg-white/5 border border-white/10 rounded-xl p-4 font-black text-[10px] text-blue-400">5 TICKETS</button>
                </div>
                <button onclick="generar(1)" class="btn-luck">¡OBTENER NÚMEROS!</button>
            </div>
        </div>

        <div class="bento p-6 mb-8">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 text-center tracking-widest">Revisar mis números comprados</h3>
            <div class="flex gap-2">
                <input type="text" id="busqueda" placeholder="Tu nombre..." class="flex-1 bg-white/5 p-3 rounded-xl border border-white/10 text-xs text-white outline-none focus:border-blue-500">
                <button onclick="buscar()" class="bg-blue-600 px-5 rounded-xl text-[10px] font-black uppercase">Buscar</button>
            </div>
            <div id="res-busqueda" class="mt-4 flex flex-wrap justify-center gap-1"></div>
        </div>

        <div id="area-suerte" class="hidden text-center mb-10">
            <div id="lista-tickets"></div>
        </div>
    </div>

    <div id="view-pago" class="hidden">
        <div class="bento p-8">
            <h2 class="text-2xl font-black uppercase text-blue-500 text-center mb-8 italic">Reportar Pago</h2>
            <div class="bg-black/40 p-6 rounded-3xl mb-8 border border-white/5 space-y-4 text-sm">
                <div class="flex justify-between"><span class="text-zinc-500 font-bold uppercase text-[10px]">Banco</span><strong>BANESCO</strong></div>
                <div class="flex justify-between"><span class="text-zinc-500 font-bold uppercase text-[10px]">Pago Móvil</span><strong>0412-1234567</strong></div>
            </div>
            <input type="text" id="form-nombre" placeholder="Nombre y Apellido" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 mb-4 font-bold outline-none">
            <input type="file" id="form-file" class="w-full bg-white/5 p-4 rounded-2xl text-xs text-zinc-500 mb-8 border border-white/10">
            <button onclick="finalizar()" class="btn-luck">Registrar Pago</button>
        </div>
    </div>

    <div id="view-exito" class="hidden">
        <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-blue-500/40">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-3xl font-black uppercase italic text-center mb-10">¡Listo el Coroto!</h2>
        <div class="bento p-8">
            <div class="receipt-row"><span class="text-[10px] font-black text-zinc-500 uppercase">Cliente</span><span id="fin-nombre" class="font-bold"></span></div>
            <div class="receipt-row border-none flex-col items-start gap-4">
                <span class="text-[10px] font-black text-zinc-500 uppercase">Tus Números</span>
                <div id="fin-tickets" class="flex flex-wrap gap-2"></div>
            </div>
        </div>
        <button onclick="location.reload()" class="w-full mt-10 py-5 bg-white/5 rounded-3xl text-zinc-500 font-black uppercase text-[11px]">Volver al Inicio</button>
    </div>

    <footer class="mt-12 mb-20 text-center space-y-8">
        <div class="bento p-8 space-y-6">
            <h3 class="text-orange-500 font-black text-xl uppercase italic">Esta es tu oportunidad</h3>
            <p class="text-white font-bold text-sm uppercase">¡QUERETE COROTO!</p>
            <div class="flex justify-center
